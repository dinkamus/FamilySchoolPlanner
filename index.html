}

// TAB: DINA SCHEDULE
// ═══════════════════════════════════════════════════════════════════════════════
const ALL_DAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

function DinaTab({ toast }) {
  const [events, setEvents] = useState(INITIAL_DINA_EVENTS);
  const [showAdd, setShowAdd] = useState(false);
  const [viewMode, setViewMode] = useState('week'); // week | day
  const [selectedDay, setSelectedDay] = useState(() => {
    const d = new Date().getDay();
    return d === 0 ? 6 : d - 1;
  });

  const today = new Date().getDay();
  const todayIdx = today === 0 ? 6 : today - 1;

  function addEvent(data) {
    setEvents(prev => [...prev, { id: uid(), ...data }]);
    setShowAdd(false);
    toast('Событие добавлено ✓');
  }

  function removeEvent(id) {
    setEvents(prev => prev.filter(e => e.id !== id));
    toast('Событие удалено');
  }

  // Stats
  const totalEvents = events.length;
  const workCount = events.filter(e=>e.type==='work').length;
  const sportCount = events.filter(e=>e.type==='sport').length;
  const studyCount = events.filter(e=>e.type==='study').length;

  // Today's events
  const todayEvents = events.filter(e=>e.day===todayIdx).sort((a,b)=>a.row-b.row);

  return (
    <div className="space-y-5">
      {/* Header */}
      <div className="flex items-center gap-4">
        <div className="w-12 h-12 rounded-full bg-gradient-to-br from-rose-400 to-pink-600 text-white flex items-center justify-center text-xl font-bold shadow-md">Д</div>
        <div>
          <h2 className="text-xl font-bold text-gray-800">Мама — расписание</h2>
          <p className="text-sm text-gray-500">Личное расписание на неделю</p>
        </div>
        <div className="ml-auto flex gap-2">
          <Btn variant={viewMode==='week'?'primary':'secondary'} sm onClick={()=>setViewMode('week')}>Неделя</Btn>
          <Btn variant={viewMode==='day'?'primary':'secondary'} sm onClick={()=>setViewMode('day')}>День</Btn>
          <Btn onClick={()=>setShowAdd(true)}>+ Событие</Btn>
        </div>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {[
          {label:'Всего событий',value:totalEvents,icon:'📋',color:'bg-gray-50'},
          {label:'Работа',value:workCount,icon:'💼',color:'bg-blue-50'},
          {label:'Спорт',value:sportCount,icon:'🏃‍♀️',color:'bg-pink-50'},
          {label:'Учёба',value:studyCount,icon:'📚',color:'bg-violet-50'},
        ].map(s=>(
          <div key={s.label} className={`${s.color} rounded-xl p-3 text-center shadow-sm`}>
            <div className="text-2xl mb-1">{s.icon}</div>
            <div className="text-xl font-bold text-gray-800">{s.value}</div>
            <div className="text-xs text-gray-500">{s.label}</div>
          </div>
        ))}
      </div>

      {/* Today highlight */}
      {todayEvents.length > 0 && (
        <div className="bg-rose-50 border border-rose-200 rounded-xl p-4">
          <div className="font-semibold text-rose-800 mb-3">📅 Сегодня — {ALL_DAYS[todayIdx]}</div>
          <div className="space-y-2">
            {todayEvents.map(e=>(
              <div key={e.id} className={`flex items-center gap-3 px-3 py-2 rounded-lg border ${DINA_EVENT_TYPES[e.type].color}`}>
                <span className="text-xs font-mono w-12">{DINA_TIME_SLOTS[e.row]}</span>
                <span className="flex-1 text-sm font-medium">{e.name}</span>
                <span className="text-xs opacity-70">{DINA_EVENT_TYPES[e.type].label}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {viewMode === 'week' && (
        <div className="bg-white rounded-xl shadow-sm overflow-x-auto">
          <table className="w-full min-w-[700px]">
            <thead>
              <tr>
                <th className="w-16 p-3 text-xs font-medium text-gray-400 border-b border-gray-100 text-left">Время</th>
                {ALL_DAYS.map((d,i)=>(
                  <th key={d} className={`p-3 text-xs font-medium border-b border-gray-100 text-center ${i===todayIdx?'text-rose-600 bg-rose-50':'text-gray-600'}`}>
                    {d}
                    {i===todayIdx && <div className="text-xs font-normal text-rose-400">сегодня</div>}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {DINA_TIME_SLOTS.map((time, row) => (
                <tr key={row} className="hover:bg-gray-50">
                  <td className="p-2 text-xs font-mono text-gray-400 border-b border-gray-50">{time}</td>
                  {ALL_DAYS.map((_, day) => {
                    const event = events.find(e=>e.row===row && e.day===day);
                    return (
                      <td key={day} className={`p-1.5 border-b border-gray-50 ${day===todayIdx?'bg-rose-50/30':''}`}>
                        {event ? (
                          <div className={`rounded-lg px-2 py-1.5 text-xs border cursor-pointer group relative ${DINA_EVENT_TYPES[event.type].color}`}>
                            <div className="font-medium truncate">{event.name}</div>
                            <div className="text-xs opacity-70">{DINA_EVENT_TYPES[event.type].label}</div>
                            <button onClick={()=>removeEvent(event.id)}
                              className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs hidden group-hover:flex items-center justify-center">×</button>
                          </div>
                        ) : <div className="h-7"/>}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {viewMode === 'day' && (
        <div className="bg-white rounded-xl shadow-sm p-4">
          {/* Day selector */}
          <div className="flex gap-2 mb-5 overflow-x-auto pb-1">
            {ALL_DAYS.map((d,i)=>(
              <button key={i} onClick={()=>setSelectedDay(i)}
                className={`px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all ${
                  selectedDay===i ? 'bg-rose-500 text-white shadow' :
                  i===todayIdx ? 'bg-rose-100 text-rose-700' :
                  'bg-gray-100 text-gray-600 hover:bg-gray-200'
                }`}>
                {d}{i===todayIdx?' ✦':''}
              </button>
            ))}
          </div>

          {/* Day events */}
          {(() => {
            const dayEvs = events.filter(e=>e.day===selectedDay).sort((a,b)=>a.row-b.row);
            if (!dayEvs.length) return <p className="text-gray-400 text-sm text-center py-8">Нет событий в этот день</p>;
            return (
              <div className="space-y-2">
                {DINA_TIME_SLOTS.map((time, row) => {
                  const ev = dayEvs.find(e=>e.row===row);
                  return ev ? (
                    <div key={row} className={`flex items-center gap-4 p-3 rounded-xl border ${DINA_EVENT_TYPES[ev.type].color}`}>
                      <div className="text-sm font-mono font-semibold w-14">{time}</div>
                      <div className="flex-1">
                        <div className="font-semibold text-sm">{ev.name}</div>
                        <div className="text-xs opacity-70">{DINA_EVENT_TYPES[ev.type].label}</div>
                      </div>
                      <button onClick={()=>removeEvent(ev.id)} className="text-red-400 hover:text-red-600">×</button>
                    </div>
                  ) : null;
                })}
              </div>
            );
          })()}
        </div>
      )}

      {/* Legend */}
      <div className="flex flex-wrap gap-2">
        {Object.entries(DINA_EVENT_TYPES).map(([k,v])=>(
          <div key={k} className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-xs border ${v.color}`}>
            {v.label}
          </div>
        ))}
      </div>

      {/* Add Event Modal */}
      {showAdd && (
        <Modal title="Добавить событие" onClose={()=>setShowAdd(false)}>
          <AddDinaEventForm onClose={()=>setShowAdd(false)} onSave={addEvent}/>
        </Modal>
      )}
    </div>
  );
}

  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));

        </Select>
      </div>
      <div><Label>Тип</Label>
        <Select value={form.type} onChange={set('type')}>

}

// TAB: SPOUSE TRIPS

function SpouseTab({ toast }) {
  const [trips, setTrips] = useState(INITIAL_SPOUSE_TRIPS);

  const [spouseName, setSpouseName] = useState('Папа');
  const [editName, setEditName] = useState(false);
  const [nameInput, setNameInput] = useState('Папа');

  const upcoming = trips.filter(t=>t.status==='upcoming').sort((a,b)=>a.start.localeCompare(b.start));
  const done = trips.filter(t=>t.status==='done').sort((a,b)=>b.start.localeCompare(a.start));

  const totalDaysAway = trips.reduce((s,t)=>{
    return s + Math.ceil((isoToDate(t.end)-isoToDate(t.start))/(1000*60*60*24))+1;
  },0);

  const upcomingDays = upcoming.reduce((s,t)=>{
    return s + Math.ceil((isoToDate(t.end)-isoToDate(t.start))/(1000*60*60*24))+1;
  },0);

  function addTrip(data) {
    setTrips(prev=>[{ id:uid(), ...data }, ...prev]);
    setShowAdd(false);
    toast('Командировка добавлена ✓');
  }

  function removeTrip(id) {
    setTrips(prev=>prev.filter(t=>t.id!==id));
    toast('Командировка удалена');
  }

  function markDone(id) {
    setTrips(prev=>prev.map(t=>t.id===id?{...t,status:'done'}:t));
    toast('Отмечено как завершённое ✓');
  }

  // Next trip countdown
  const nextTrip = upcoming[0];
  const today = new Date().toISOString().slice(0,10);
  const daysToNext = nextTrip ? Math.ceil((isoToDate(nextTrip.start)-new Date())/(1000*60*60*24)) : null;

  return (
    <div className="space-y-5">
      {/* Header with name edit */}
      <div className="flex items-center gap-3">
        <div className="w-12 h-12 rounded-full bg-gray-700 text-white flex items-center justify-center text-xl font-bold">

          <div className="flex items-center gap-2">
            <input className="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
              value={nameInput} onChange={e=>setNameInput(e.target.value)} autoFocus/>
            <Btn sm onClick={()=>{setSpouseName(nameInput);setEditName(false);}}>Сохранить</Btn>
            <Btn sm variant="secondary" onClick={()=>setEditName(false)}>Отмена</Btn>
          </div>

          <div className="flex items-center gap-2">
            <h2 className="text-xl font-bold text-gray-800">{spouseName}</h2>
            <button onClick={()=>{setNameInput(spouseName);setEditName(true);}} className="text-gray-400 hover:text-gray-600 text-sm">✏️</button>

          <Btn onClick={()=>setShowAdd(true)}>+ Командировка</Btn>
        </div>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-3 gap-4">
        <div className="bg-white rounded-xl p-4 shadow-sm text-center">
          <div className="text-3xl font-bold text-gray-800">{upcoming.length}</div>
          <div className="text-xs text-gray-500 mt-1">Предстоящих поездок</div>
        </div>
        <div className="bg-blue-50 rounded-xl p-4 shadow-sm text-center">
          <div className="text-3xl font-bold text-blue-700">{upcomingDays}</div>
          <div className="text-xs text-blue-600 mt-1">Дней в командировках</div>
        </div>
        <div className="bg-gray-50 rounded-xl p-4 shadow-sm text-center">
          <div className="text-3xl font-bold text-gray-600">{done.length}</div>
          <div className="text-xs text-gray-500 mt-1">Завершено поездок</div>
        </div>
      </div>

      {/* Next trip alert */}
      {nextTrip && (
        <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-center gap-4">
          <div className="text-3xl">✈️</div>
          <div className="flex-1">
            <div className="font-semibold text-amber-800">Следующая командировка — {nextTrip.city}</div>
            <div className="text-sm text-amber-700">{nextTrip.purpose} · {formatDate(nextTrip.start)} — {formatDate(nextTrip.end)}</div>
          </div>
          <div className="text-right">
            <div className="text-2xl font-bold text-amber-700">{daysToNext <= 0 ? 'Сегодня' : `${daysToNext}д`}</div>
            <div className="text-xs text-amber-600">{daysToNext > 0 ? 'до отъезда' : ''}</div>
          </div>
        </div>
      )}

      {/* Upcoming trips */}
      <div className="bg-white rounded-xl shadow-sm overflow-hidden">
        <div className="p-4 border-b border-gray-100">
          <h3 className="font-semibold text-gray-800">🗓 Предстоящие командировки</h3>
        </div>
        {upcoming.length === 0 && <p className="p-4 text-sm text-gray-400">Нет запланированных командировок</p>}
        <div className="divide-y divide-gray-50">
          {upcoming.map(t => {
            const days = Math.ceil((isoToDate(t.end)-isoToDate(t.start))/(1000*60*60*24))+1;
            return (
              <div key={t.id} className="flex items-center gap-4 px-4 py-3 hover:bg-gray-50">
                <div className="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center text-lg">🏙️</div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-gray-800">{t.city}</div>
                  <div className="text-sm text-gray-500">{t.purpose}</div>
                </div>
                <div className="text-right text-sm">
                  <div className="text-gray-700 font-medium">{formatDate(t.start)} — {formatDate(t.end)}</div>
                  <div className="text-gray-400 text-xs">{days} {days===1?'день':days<5?'дня':'дней'}</div>
                </div>
                <div className="flex gap-1">
                  <Btn sm variant="success" onClick={()=>markDone(t.id)}>✓</Btn>
                  <Btn sm variant="danger" onClick={()=>removeTrip(t.id)}>×</Btn>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Past trips */}
      {done.length > 0 && (
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="p-4 border-b border-gray-100">
            <h3 className="font-semibold text-gray-800">✅ Завершённые командировки</h3>
          </div>
          <div className="divide-y divide-gray-50">
            {done.map(t => {
              const days = Math.ceil((isoToDate(t.end)-isoToDate(t.start))/(1000*60*60*24))+1;
              return (
                <div key={t.id} className="flex items-center gap-4 px-4 py-3 opacity-60 hover:opacity-80">
                  <div className="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center text-lg">🏙️</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-medium text-gray-700">{t.city}</div>
                    <div className="text-sm text-gray-500">{t.purpose}</div>
                  </div>
                  <div className="text-right text-sm">
                    <div className="text-gray-600">{formatDate(t.start)} — {formatDate(t.end)}</div>
                    <div className="text-gray-400 text-xs">{days} {days===1?'день':days<5?'дня':'дней'}</div>
                  </div>
                  <Btn sm variant="danger" onClick={()=>removeTrip(t.id)}>×</Btn>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Add trip modal */}
      {showAdd && (
        <Modal title="Добавить командировку" onClose={()=>setShowAdd(false)}>
          <AddSpouseTripForm onClose={()=>setShowAdd(false)} onSave={addTrip}/>
        </Modal>
      )}
    </div>
  );
}

function AddSpouseTripForm({ onClose, onSave }) {
  const [form, setForm] = useState({ city:'', purpose:'', start:'', end:'', status:'upcoming' });
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  return (
    <div className="space-y-3">
      <div><Label>Город / страна</Label><Input value={form.city} onChange={set('city')} placeholder="Астана"/></div>
      <div><Label>Цель поездки</Label><Input value={form.purpose} onChange={set('purpose')} placeholder="Конференция"/></div>
      <div className="grid grid-cols-2 gap-3">
        <div><Label>Дата отъезда</Label><Input type="date" value={form.start} onChange={set('start')}/></div>
        <div><Label>Дата возврата</Label><Input type="date" value={form.end} onChange={set('end')}/></div>
      </div>
      <div><Label>Статус</Label>
        <Select value={form.status} onChange={set('status')}>
          <option value="upcoming">Предстоящая</option>
          <option value="done">Завершённая</option>
        </Select>
      </div>
      <div className="flex gap-2 pt-2">
        <Btn onClick={()=>{ if(form.city&&form.start&&form.end) onSave(form); }}>Добавить</Btn>
        <Btn variant="secondary" onClick={onClose}>Отмена</Btn>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════════
// ─── USER PHOTO MODAL (для родителей) ────────────────────────────────────────
function UserPhotoModal({ name, currentPhoto, currentEmoji, onClose, onSave }) {
  const EMOJI_LIST = ['👩','👨','🧑','👩‍💼','👨‍💼','👩‍🎓','👨‍🎓','😊','😎','🌟','⭐','💫','🦋','🌸','🌺','🌻','🎯','🚀','💎','👑'];
  const [photo, setPhoto] = useState(currentPhoto||'');
  const [emoji, setEmoji] = useState(currentEmoji||'');
  const fileRef = useRef(null);

  function handleFile(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { setPhoto(ev.target.result); setEmoji(''); };
    reader.readAsDataURL(file);
  }

  return (
    <Modal title={`Фото профиля — ${name}`} onClose={onClose}>
      <div className="space-y-4">
        {/* Preview */}
        <div className="flex justify-center">
          <div className="w-24 h-24 rounded-full overflow-hidden border-4 border-gray-200 flex items-center justify-center bg-gray-100">
            {photo ? <img src={photo} alt="" className="w-full h-full object-cover"/> :
             emoji ? <span className="text-5xl">{emoji}</span> :
             <span className="text-3xl font-bold text-gray-400">{name[0]}</span>}
          </div>
        </div>

        {/* Upload */}
        <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile}/>
        <button type="button" onClick={()=>fileRef.current.click()}
          className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl text-sm flex items-center justify-center gap-2 transition-colors">
          📷 Загрузить фото с устройства
        </button>

        {/* Emoji */}
        <div>
          <div className="text-sm font-medium text-gray-600 mb-2">Или выбрать аватар:</div>
          <div className="flex flex-wrap gap-2">
            {EMOJI_LIST.map(em=>(
              <button key={em} type="button" onClick={()=>{setEmoji(em);setPhoto('');}}
                className={`w-10 h-10 rounded-xl text-2xl flex items-center justify-center transition-all ${emoji===em?'bg-blue-100 ring-2 ring-blue-500 scale-110':'bg-gray-50 hover:bg-gray-100 border border-gray-200'}`}>
                {em}
              </button>
            ))}
          </div>
        </div>

        {(photo||emoji) && (
          <button type="button" onClick={()=>{setPhoto('');setEmoji('');}}
            className="w-full text-gray-400 hover:text-gray-600 text-sm py-1 transition-colors">
            Убрать фото
          </button>
        )}

        <div className="flex gap-2 pt-1">
          <Btn onClick={()=>onSave(photo,emoji)}>Сохранить</Btn>
          <Btn variant="secondary" onClick={onClose}>Отмена</Btn>
        </div>
      </div>
    </Modal>
  );
}

function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);

  useEffect(() => {
    const session = getSession();
    if (session) setCurrentUser(session);
    setAuthChecked(true);
  }, []);

  function handleAuth(user) { setCurrentUser(user); }
  function handleLogout() { clearSession(); setCurrentUser(null); }

  if (!authChecked) return (
    <div className="min-h-screen flex items-center justify-center bg-gray-50">
      <div className="text-gray-400 text-lg">⏳ Загрузка...</div>
    </div>
  );

  if (!currentUser) return <AuthScreen onAuth={handleAuth}/>;

  return <MainApp user={currentUser} onLogout={handleLogout}/>;
}

function MainApp({ user, onLogout }) {
  const storageKey = `fsp_data_${user.id}`;

  function loadData() {
    try { return JSON.parse(localStorage.getItem(storageKey) || 'null'); } catch { return null; }
  }
  function saveData(data) { localStorage.setItem(storageKey, JSON.stringify(data)); }

  const saved = loadData();

  const [children, setChildren] = useState(saved?.children || INITIAL_CHILDREN);
  const [notifications, setNotifications] = useState(saved?.notifications || INITIAL_NOTIFICATIONS);
  const [activeTab, setActiveTab] = useState('home');
  const [selectedChild, setSelectedChild] = useState((saved?.children || INITIAL_CHILDREN)[0].id);
  const [showAddChild, setShowAddChild] = useState(false);
  const [editingChild, setEditingChild] = useState(null); // child object being edited
  const [toastMsg, setToastMsg] = useState(null);
  const [showUserMenu, setShowUserMenu] = useState(false);

  // Persist data on every change
  useEffect(() => { saveData({ children, notifications }); }, [children, notifications]);

  function toast(msg) { setToastMsg(msg); }

  function updateChild(id, fn) {
    setChildren(prev => prev.map(c => c.id===id ? fn(c) : c));
  }

  function addChild(data) {
    const child = {
      id: uid(), ...data, age: parseInt(data.age)||0,
      lessons:[], grades:[], vacations:[],
      accessLevel:'view', accessToken:`tok-${uid()}`,
    };
    setChildren(prev=>[...prev, child]);
    setSelectedChild(child.id);
    setShowAddChild(false);
    toast('Профиль ребёнка создан ✓');
  }

  const isParent = user.role === 'parent';
  const myChildId = user.childId; // null for parents
  const myChild = myChildId ? children.find(c=>c.id===myChildId) : null;
  const unreadCount = notifications.filter(n=>!n.read).length;

  // For child: auto-select their profile
  useEffect(() => {
    if (myChildId) setSelectedChild(myChildId);
  }, [myChildId]);

  // Tabs visible per role
  const ALL_TABS = [
    { id:'home',         label:'Главная',            icon:'🏠' },
    { id:'schedule',     label:'Расписание',         icon:'📅' },
    { id:'homework',     label:'Домашние задания',   icon:'✏️' },
    { id:'flights',      label:'Перелёты',           icon:'✈️' },
    { id:'vacations',    label:'Каникулы & Отпуск',  icon:'🏖️' },
    { id:'grades',       label:'Успеваемость',       icon:'📊' },
    { id:'exams',        label:'Экзамены',           icon:'📝' },
    { id:'budget',       label:'Бюджет',             icon:'💰' },
    { id:'dina',         label:'Мама',               icon:'👩', parentOnly:true },
    { id:'spouse',       label:'Папа',               icon:'👨', parentOnly:true },
    { id:'notifications',label:'Уведомления',        icon:'🔔', badge:unreadCount },
  ];
  const TABS = ALL_TABS.filter(t => isParent || !t.parentOnly);

  const USER_PHOTO_KEY = `fsp_photo_${user.id}`;
  const [userPhoto, setUserPhoto] = useState(()=>localStorage.getItem(USER_PHOTO_KEY)||'');
  const [userEmoji, setUserEmoji] = useState(()=>localStorage.getItem(`fsp_emoji_${user.id}`)||'');
  const [showPhotoModal, setShowPhotoModal] = useState(false);

  function saveUserPhoto(photo, emoji) {
    if (photo) { localStorage.setItem(USER_PHOTO_KEY, photo); setUserPhoto(photo); setUserEmoji(''); localStorage.removeItem(`fsp_emoji_${user.id}`); }
    else if (emoji) { localStorage.setItem(`fsp_emoji_${user.id}`, emoji); setUserEmoji(emoji); setUserPhoto(''); localStorage.removeItem(USER_PHOTO_KEY); }
    else { localStorage.removeItem(USER_PHOTO_KEY); localStorage.removeItem(`fsp_emoji_${user.id}`); setUserPhoto(''); setUserEmoji(''); }
    setShowPhotoModal(false);
    toast('Фото обновлено ✓');
  }

  const userAvatarColor = user.name==='Мама'
    ? 'from-rose-400 to-pink-600'
    : user.name==='Папа'
    ? 'from-blue-500 to-indigo-700'
    : 'from-amber-400 to-orange-500';

  return (
    <div className="min-h-screen bg-slate-50">
      {/* Header */}
      <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-30">
        <div className="max-w-6xl mx-auto px-4">
          <div className="flex items-center h-14 gap-4">
            <div className="flex items-center gap-2">
              <span className="text-xl">🏠</span>
              <span className="font-bold text-gray-800 text-sm hidden sm:block">Семейный планировщик</span>
            </div>

            {/* Child avatars — only parents see all, child sees only self */}
            {isParent ? (
              <div className="flex items-center gap-1.5 ml-2">
                {children.map(ch=>(
                  <div key={ch.id} className="flex flex-col items-center gap-0.5">
                    <div className="relative">
                      <Avatar child={ch} active={ch.id===selectedChild} onClick={()=>setSelectedChild(ch.id)}/>
                    </div>
                    {/* Edit button — always visible under avatar */}
                    <button
                      onClick={()=>setEditingChild(ch)}
                      className="text-gray-400 hover:text-blue-600 transition-colors text-xs leading-none"
                      title={`Изменить ${ch.name}`}>
                      ✏️
                    </button>
                  </div>
                ))}
                <div className="flex flex-col items-center gap-0.5 ml-1">
                  <button onClick={()=>setShowAddChild(true)}
                    className="w-10 h-10 rounded-full border-2 border-dashed border-gray-300 text-gray-400 hover:border-blue-400 hover:text-blue-500 text-xl flex items-center justify-center transition-colors">+</button>
                  <span className="text-xs text-gray-300">добавить</span>
                </div>
              </div>
            ) : myChild ? (
              <div className="flex items-center gap-2 ml-2">
                <Avatar child={myChild} active size="md"/>
                <div className="hidden sm:block">
                  <div className="text-sm font-semibold text-gray-800">{myChild.name}</div>
                  <div className="text-xs text-gray-500">{classLabel(myChild.school, myChild.class)} · {myChild.school}</div>
                </div>
              </div>
            ) : null}

            {/* User menu */}
            <div className="ml-auto relative">
              <button onClick={()=>setShowUserMenu(s=>!s)}
                className="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 rounded-xl px-3 py-2 transition-colors">
                <div className="w-7 h-7 rounded-full overflow-hidden flex-shrink-0 flex items-center justify-center">
                  {userPhoto ? <img src={userPhoto} alt="" className="w-full h-full object-cover"/> :
                   userEmoji ? <span className={`w-full h-full bg-gradient-to-br ${userAvatarColor} flex items-center justify-center text-sm`}>{userEmoji}</span> :
                   <span className={`w-full h-full bg-gradient-to-br ${userAvatarColor} text-white text-xs font-bold flex items-center justify-center`}>{user.name?.[0]?.toUpperCase()||'?'}</span>}
                </div>
                <span className="text-sm font-medium text-gray-700 hidden sm:block">{user.name}</span>
                <span className="text-gray-400 text-xs">▾</span>
              </button>
              {showUserMenu && (
                <div className="absolute right-0 top-full mt-2 bg-white rounded-xl shadow-xl border border-gray-100 py-2 w-52 z-50">
                  <div className="px-4 py-2 border-b border-gray-100">
                    <div className="text-sm font-semibold text-gray-800">{user.name}</div>
                    <div className="text-xs text-gray-500 truncate">{user.email}</div>
                    <div className={`text-xs mt-1 font-medium ${isParent?'text-blue-600':'text-amber-600'}`}>
                      {isParent ? '👑 Родитель — полный доступ' : '👤 Ребёнок — личные данные'}
                    </div>
                  </div>
                  {passkeySupported() && (() => {
                    const passkeys = getPasskeys();
                    const hasPasskey = !!passkeys[user.id];
                    return (
                      <button onClick={async ()=>{
                        setShowUserMenu(false);
                        try {
                          await registerPasskey(user.id, user.name);
                          alert('✅ Face ID / Touch ID подключён! При следующем входе используйте биометрию.');
                        } catch(e) {
                          alert('Не удалось подключить Face ID: ' + (e.message||e));
                        }
                      }}
                        className="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors flex items-center gap-2">
                        {hasPasskey ? '🔒 Face ID подключён ✓' : '🔓 Подключить Face ID'}
                      </button>
                    );
                  })()}
                  <button onClick={()=>{ setShowUserMenu(false); setShowPhotoModal(true); }}
                    className="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors flex items-center gap-2">
                    🖼️ Изменить фото профиля
                  </button>
                  <button onClick={()=>{ setShowUserMenu(false); onLogout(); }}
                    className="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors flex items-center gap-2">
                    🚪 Выйти из аккаунта
                  </button>
                </div>
              )}
            </div>
          </div>

          {/* Tab navigation */}
          <div className="flex overflow-x-auto -mb-px">
            {TABS.map(tab=>(
              <button key={tab.id} onClick={()=>setActiveTab(tab.id)}
                className={`flex items-center gap-1.5 px-4 py-3 text-sm font-medium border-b-2 whitespace-nowrap transition-colors relative ${
                  activeTab===tab.id ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'
                }`}>
                <span>{tab.icon}</span>
                <span className="hidden sm:inline">{tab.label}</span>
                {tab.badge > 0 && (
                  <span className="absolute -top-0.5 right-1 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center">{tab.badge}</span>
                )}
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* Main content */}
      <main className="max-w-6xl mx-auto px-4 py-6">
        {activeTab==='home' && (
          <HomeTab children={children} user={user} isParent={isParent} myChildId={myChildId} notifications={notifications} setActiveTab={setActiveTab} toast={toast}/>
        )}
        {activeTab==='homework' && (
          <HomeworkTab children={children} updateChild={updateChild} toast={toast} isParent={isParent} myChildId={myChildId}/>
        )}
        {activeTab==='schedule' && (
          <ScheduleTab children={children} selectedChild={isParent?selectedChild:myChildId} setSelectedChild={setSelectedChild} updateChild={updateChild} toast={toast} isParent={isParent} myChildId={myChildId}/>
        )}
        {activeTab==='flights' && (
          <FlightsTab children={children} updateChild={updateChild} toast={toast} isParent={isParent} myChildId={myChildId}/>
        )}
        {activeTab==='vacations' && (
          <VacationsTab children={children} updateChild={updateChild} toast={toast} isParent={isParent} myChildId={myChildId}/>
        )}
        {activeTab==='grades' && (
          <GradesTab children={children} selectedChild={isParent?selectedChild:myChildId} setSelectedChild={setSelectedChild} updateChild={updateChild} toast={toast} isParent={isParent} myChildId={myChildId}/>
        )}
        {activeTab==='exams' && (
          <ExamsTab children={children} updateChild={updateChild} toast={toast} isParent={isParent} myChildId={myChildId}/>
        )}
        {activeTab==='budget' && (
          <BudgetTab children={children} toast={toast} isParent={isParent} myChildId={myChildId}/>
        )}
        {activeTab==='dina' && isParent && (
          <DinaTab toast={toast}/>
        )}
        {activeTab==='spouse' && isParent && (
          <SpouseTab toast={toast}/>
        )}
        {activeTab==='notifications' && (
          <NotificationsTab children={children} notifications={notifications} setNotifications={setNotifications} toast={toast} isParent={isParent} myChildId={myChildId}/>
        )}
      </main>

      {isParent && showAddChild && <AddChildModal onClose={()=>setShowAddChild(false)} onSave={addChild}/>}
      {showPhotoModal && <UserPhotoModal name={user.name} currentPhoto={userPhoto} currentEmoji={userEmoji} onClose={()=>setShowPhotoModal(false)} onSave={saveUserPhoto}/>}
      {isParent && editingChild && (
        <EditChildModal
          child={editingChild}
          onClose={()=>setEditingChild(null)}
          onSave={form=>{
            updateChild(editingChild.id, c=>({...c, ...form, age:parseInt(form.age)||c.age}));
            setEditingChild(null);
            toast(`${form.name} обновлён ✓`);
          }}
        />
      )}
      {toastMsg && <Toast msg={toastMsg} onDone={()=>setToastMsg(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
