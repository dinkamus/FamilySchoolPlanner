let idCounter = 1000;
const uid = () => `id-${++idCounter}-${Math.random().toString(36).slice(2,7)}`;

function avg(arr) { return arr.length ? (arr.reduce((s,v)=>s+v,0)/arr.length) : 0; }

function getChildSubjectAverages(child) {
  const map = {};
  child.grades.forEach(g => {
    if (!map[g.subject]) map[g.subject] = [];
    map[g.subject].push(g.score);
  });
  const result = {};
  Object.keys(map).forEach(s => result[s] = parseFloat(avg(map[s]).toFixed(2)));
  return result;
}

function getChildAvgScore(child) {
  if (!child.grades.length) return 0;
  return parseFloat(avg(child.grades.map(g=>g.score)).toFixed(2));
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU');
}

function isoToDate(iso) { return new Date(iso + 'T00:00:00'); }

function getDaysInMonth(year, month) { return new Date(year, month+1, 0).getDate(); }

function getFirstDayOfMonth(year, month) {
  const d = new Date(year, month, 1).getDay();
  return d === 0 ? 6 : d - 1; // Monday=0
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return ()=>clearTimeout(t); }, []);
  return (
    <div className="toast fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-medium">
      {msg}
    </div>
  );
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children, wide }) {
  useEffect(() => {
    const esc = e => { if (e.key==='Escape') onClose(); };
    document.addEventListener('keydown', esc);
    return () => document.removeEventListener('keydown', esc);
  }, []);
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
      <div className={`bg-white rounded-2xl shadow-2xl w-full ${wide?'max-w-2xl':'max-w-md'} max-h-[90vh] overflow-y-auto`}>
        <div className="flex items-center justify-between p-5 border-b border-gray-100">
          <h2 className="text-lg font-semibold text-gray-800">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

// ─── FORM HELPERS ─────────────────────────────────────────────────────────────
function Label({ children }) { return <label className="block text-sm font-medium text-gray-700 mb-1">{children}</label>; }
function Input({ ...p }) { return <input className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" {...p}/>; }
function Select({ children, ...p }) { return <select className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" {...p}>{children}</select>; }
function Btn({ children, variant='primary', sm, ...p }) {
  const base = 'font-medium rounded-lg transition-all focus:outline-none';
  const size = sm ? 'px-3 py-1.5 text-xs' : 'px-4 py-2 text-sm';
  const v = {
    primary: 'bg-blue-600 hover:bg-blue-700 text-white',
    secondary: 'bg-gray-100 hover:bg-gray-200 text-gray-700',
    danger: 'bg-red-50 hover:bg-red-100 text-red-600',
    success: 'bg-green-600 hover:bg-green-700 text-white',
  };
  return <button className={`${base} ${size} ${v[variant]}`} {...p}>{children}</button>;
}

// ─── CHILD AVATAR ─────────────────────────────────────────────────────────────
function Avatar({ child, size='md', onClick, active }) {
  const c = COLORS[child.color];
  const sz = size==='sm' ? 'w-8 h-8 text-xs' : 'w-10 h-10 text-sm';
  return (
    <button
      onClick={onClick}
      className={`${sz} rounded-full ${c.bg} text-white font-bold flex items-center justify-center transition-all ring-2 ${active ? 'ring-offset-2 ring-gray-800 scale-110' : 'ring-transparent hover:scale-105'}`}
      title={child.name}
    >
      {child.name[0]}
    </button>
  );
}

// ─── SCORE BADGE ──────────────────────────────────────────────────────────────
function ScoreBadge({ score }) {
  const colors = { 5:'bg-green-100 text-green-700', 4:'bg-blue-100 text-blue-700', 3:'bg-amber-100 text-amber-700', 2:'bg-red-100 text-red-700' };
  return <span className={`${colors[score]||'bg-gray-100 text-gray-700'} px-2 py-0.5 rounded-full text-xs font-bold`}>{score}</span>;
}

// ─── STATUS BADGE ─────────────────────────────────────────────────────────────
function StatusBadge({ status }) {
  const map = { paid:'bg-green-100 text-green-700', pending:'bg-amber-100 text-amber-700', overdue:'bg-red-100 text-red-700' };
  const labels = { paid:'Оплачено', pending:'Ожидается', overdue:'Просрочено' };
  return <span className={`${map[status]} px-2 py-0.5 rounded-full text-xs font-medium`}>{labels[status]}</span>;
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────────
function ProgressBar({ value, max, color='bg-blue-500' }) {
  const pct = max ? Math.min(100, Math.round(value/max*100)) : 0;
  return (
    <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
      <div className={`h-full ${color} progress-bar rounded-full`} style={{width:`${pct}%`}}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
function ScheduleTab({ children, selectedChild, setSelectedChild, updateChild, toast }) {
  const [view, setView] = useState('overview'); // overview | individual
  const [showAddLesson, setShowAddLesson] = useState(false);
  const [showChangeRequests, setShowChangeRequests] = useState(false);
  const [changeRequests, setChangeRequests] = useState(INITIAL_CHANGE_REQUESTS);

  const child = children.find(c=>c.id===selectedChild) || children[0];

  const today = new Date();
  const todayDay = today.getDay() === 0 ? 6 : today.getDay() - 1; // 0=Mon

  // Lessons today across all children
  const todayLessons = [];
  children.forEach(ch => {
    ch.lessons.filter(l=>l.day===todayDay).forEach(l => {
      todayLessons.push({ ...l, childName: ch.name, childColor: ch.color, school: ch.school });
    });
  });
  todayLessons.sort((a,b) => a.row - b.row);

  function addLesson(data) {
    const lesson = { id: uid(), ...data };
    updateChild(child.id, c => ({ ...c, lessons: [...c.lessons, lesson] }));
    setShowAddLesson(false);
    toast('Урок добавлен ✓');
  }

  function removeLesson(lessonId) {
    updateChild(child.id, c => ({ ...c, lessons: c.lessons.filter(l=>l.id!==lessonId) }));
    toast('Урок удалён');
  }

  function approveRequest(id, approve) {
    setChangeRequests(prev => prev.map(r => r.id===id ? { ...r, status: approve?'approved':'declined' } : r));
    toast(approve ? 'Запрос одобрен ✓' : 'Запрос отклонён');
  }

  const pendingRequests = changeRequests.filter(r=>r.status==='pending');

  return (
    <div>
      {/* Sub-nav */}
      <div className="flex gap-2 mb-5">
        <Btn variant={view==='overview'?'primary':'secondary'} onClick={()=>setView('overview')}>Обзор всех детей</Btn>
        <Btn variant={view==='individual'?'primary':'secondary'} onClick={()=>setView('individual')}>Расписание ребёнка</Btn>
        <div className="ml-auto flex items-center gap-2">
          {pendingRequests.length > 0 && (
            <button onClick={()=>setShowChangeRequests(true)} className="relative bg-amber-50 border border-amber-200 text-amber-700 rounded-lg px-3 py-1.5 text-sm font-medium hover:bg-amber-100">
              Запросы
              <span className="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">{pendingRequests.length}</span>
            </button>
          )}
        </div>
      </div>

      {view === 'overview' && (
        <div>
          {/* Child cards */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            {children.map(ch => {
              const c = COLORS[ch.color];
              const todayCount = ch.lessons.filter(l=>l.day===todayDay).length;
              return (
                <div key={ch.id} className={`bg-white rounded-xl p-4 border-l-4 ${c.border} shadow-sm cursor-pointer hover:shadow-md transition-shadow`}
                  onClick={() => { setSelectedChild(ch.id); setView('individual'); }}>
                  <div className="flex items-center gap-3 mb-2">
                    <Avatar child={ch} size="md" />
                    <div>
                      <div className="font-semibold text-gray-800">{ch.name}</div>
                      <div className="text-xs text-gray-500">{ch.class} · {ch.school}</div>
                    </div>

          {/* Access link */}

                <div key={r.id} className={`rounded-xl border p-4 ${statusColors[r.status]}`}>

                    <div className="flex gap-2">

      )}

  );
}

function AddLessonModal({ onClose, onSave }) {

    <Modal title="Добавить урок" onClose={onClose}>

// TAB: VACATIONS & TRIPS
// ═══════════════════════════════════════════════════════════════════════════════
function VacationsTab({ children, updateChild, toast }) {
  const [calYear, setCalYear] = useState(2026);
  const [calMonth, setCalMonth] = useState(5); // June
  const [trips, setTrips] = useState(INITIAL_TRIPS);
  const [showAddVac, setShowAddVac] = useState(null); // childId
  const [showAddTrip, setShowAddTrip] = useState(false);
  const [selectedChild, setSelectedChild] = useState(null);

  function addVacation(childId, data) {
    updateChild(childId, c => ({ ...c, vacations: [...c.vacations, { id: uid(), ...data }] }));
    setShowAddVac(null);
    toast('Каникулы добавлены ✓');
  }

  function removeVacation(childId, vacId) {
    updateChild(childId, c => ({ ...c, vacations: c.vacations.filter(v=>v.id!==vacId) }));
    toast('Период удалён');
  }

  function addTrip(data) {
    setTrips(t => [...t, { id: uid(), ...data }]);
    setShowAddTrip(false);
    toast('Отпуск запланирован ✓');
  }

  // Build calendar day data
  const daysInMonth = getDaysInMonth(calYear, calMonth);
  const firstDay = getFirstDayOfMonth(calYear, calMonth);

  function getDayType(date) {
    const iso = date.toISOString().slice(0,10);
    const dw = date.getDay();
    if (dw===0||dw===6) return 'weekend';
    // Trip?
    const inTrip = trips.some(t => iso>=t.start && iso<=t.end);
    if (inTrip) return 'trip';
    // All children on vacation?
    const allVac = children.every(ch => ch.vacations.some(v => iso>=v.start && iso<=v.end));
    if (allVac && children.length>0) return 'all-vac';
    // Any child on vacation?
    const anyVac = children.some(ch => ch.vacations.some(v => iso>=v.start && iso<=v.end));
    if (anyVac) return 'some-vac';
    return 'school';
  }

  const dayColors = {
    weekend: 'bg-gray-50 text-gray-400',
    school: 'bg-blue-50 text-blue-800 hover:bg-blue-100',
    'some-vac': 'bg-orange-100 text-orange-800',
    'all-vac': 'bg-purple-100 text-purple-800 font-semibold',
    trip: 'bg-green-100 text-green-800',
  };

  const calCells = [];
  for (let i=0; i<firstDay; i++) calCells.push(null);
  for (let d=1; d<=daysInMonth; d++) {
    calCells.push(new Date(calYear, calMonth, d));
  }

  const prevMonth = () => { if (calMonth===0) { setCalYear(y=>y-1); setCalMonth(11); } else setCalMonth(m=>m-1); };
  const nextMonth = () => { if (calMonth===11) { setCalYear(y=>y+1); setCalMonth(0); } else setCalMonth(m=>m+1); };

  // Count days until next vacation for each child
  const today = new Date().toISOString().slice(0,10);

  return (
    <div className="space-y-6">
      {/* Calendar */}
      <div className="bg-white rounded-xl shadow-sm p-5">
        <div className="flex items-center justify-between mb-4">
          <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-lg">‹</button>
          <h3 className="font-semibold text-gray-800">{MONTHS_RU[calMonth]} {calYear}</h3>
          <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-lg">›</button>
        </div>
        <div className="grid grid-cols-7 gap-1 mb-2">
          {['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=><div key={d} className="text-center text-xs font-medium text-gray-400 py-1">{d}</div>)}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {calCells.map((date, i) => {
            if (!date) return <div key={i}/>;
            const type = getDayType(date);
            return (
              <div key={i} className={`aspect-square flex items-center justify-center text-sm rounded-lg cursor-default transition-colors ${dayColors[type]}`}>
                {date.getDate()}
              </div>
            );
          })}
        </div>
        {/* Legend */}
        <div className="flex flex-wrap gap-3 mt-4 text-xs">
          {[
            {color:'bg-blue-100 text-blue-700',label:'Учебный день'},
            {color:'bg-orange-100 text-orange-700',label:'Каникулы'},
            {color:'bg-purple-100 text-purple-700',label:'Все дети свободны 🎯'},
            {color:'bg-green-100 text-green-700',label:'Запланированный отпуск'},
            {color:'bg-gray-100 text-gray-500',label:'Выходной'},
          ].map(({color,label})=>(
            <div key={label} className="flex items-center gap-1.5">
              <div className={`w-3 h-3 rounded ${color}`}/>
              <span className="text-gray-600">{label}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        {/* Vacations per child */}
        <div className="bg-white rounded-xl shadow-sm p-5">
          <h3 className="font-semibold text-gray-800 mb-4">🏫 Каникулы по школам</h3>
          <div className="space-y-4">
            {children.map(ch => {
              const c = COLORS[ch.color];
              return (
                <div key={ch.id}>
                  <div className="flex items-center gap-2 mb-2">
                    <Avatar child={ch} size="sm"/>
                    <span className="font-medium text-sm">{ch.name}</span>
                    <span className="text-xs text-gray-500">· {ch.school}</span>
                    <Btn sm variant="secondary" onClick={()=>setShowAddVac(ch.id)}>+ Добавить</Btn>
                  </div>
                  {ch.vacations.length===0 && <p className="text-xs text-gray-400 ml-10">Нет каникул</p>}
                  <div className="space-y-1 ml-10">
                    {ch.vacations.map(v=>(
                      <div key={v.id} className="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2 text-xs">
                        <span className="font-medium text-gray-700">{v.name}</span>
                        <span className="text-gray-500">{formatDate(v.start)} – {formatDate(v.end)}</span>
                        <button onClick={()=>removeVacation(ch.id,v.id)} className="text-red-400 hover:text-red-600 ml-2">×</button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Trips */}
        <div className="bg-white rounded-xl shadow-sm p-5">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold text-gray-800">✈️ Запланированный отпуск</h3>
            <Btn sm onClick={()=>setShowAddTrip(true)}>+ Отпуск</Btn>
          </div>
          {trips.length===0 && <p className="text-sm text-gray-400">Отпуска не запланированы</p>}
          <div className="space-y-3">
            {trips.map(t=>(
              <div key={t.id} className="bg-green-50 border border-green-200 rounded-xl p-3">
                <div className="font-medium text-green-800 text-sm">{t.name}</div>
                <div className="text-xs text-green-600 mt-1">{formatDate(t.start)} – {formatDate(t.end)}</div>
                <div className="text-xs text-green-700 mt-1">
                  {Math.ceil((isoToDate(t.end)-isoToDate(t.start))/(1000*60*60*24))+1} дней
                </div>
              </div>
            ))}
          </div>

          {/* "Windows" hint */}
          <div className="mt-4 bg-purple-50 border border-purple-200 rounded-xl p-3">
            <div className="text-xs font-medium text-purple-800 mb-1">🎯 Окна для отпуска</div>
            <div className="text-xs text-purple-700">
              Фиолетовые дни в календаре — все дети одновременно на каникулах. Июнь–август 2026 полностью свободен.
            </div>
          </div>
        </div>
      </div>

      {/* Add vacation modal */}
      {showAddVac && (
        <AddVacModal childName={children.find(c=>c.id===showAddVac)?.name} onClose={()=>setShowAddVac(null)} onSave={data=>addVacation(showAddVac,data)}/>
      )}
      {showAddTrip && (
        <AddTripModal onClose={()=>setShowAddTrip(false)} onSave={addTrip}/>
      )}
    </div>
  );
}

// TAB: GRADES

function GradesTab({ children, selectedChild, setSelectedChild, updateChild, toast }) {
  const [view, setView] = useState('overview');
  const [showAddGrade, setShowAddGrade] = useState(false);

  const child = children.find(c=>c.id===selectedChild) || children[0];

  function addGrade(data) {
    const grade = { id: uid(), ...data };
    updateChild(child.id, c => ({ ...c, grades: [grade, ...c.grades] }));
    setShowAddGrade(false);
    toast('Оценка добавлена ✓');
  }

  // Recent grades across all children
  const allGrades = [];
  children.forEach(ch => ch.grades.forEach(g => allGrades.push({...g, childName:ch.name, childColor:ch.color, childId:ch.id})));
  allGrades.sort((a,b) => b.date.localeCompare(a.date));

  return (
    <div>
      <div className="flex gap-2 mb-5">
        <Btn variant={view==='overview'?'primary':'secondary'} onClick={()=>setView('overview')}>Обзор</Btn>
        <Btn variant={view==='individual'?'primary':'secondary'} onClick={()=>setView('individual')}>По ребёнку</Btn>
        <div className="ml-auto"><Btn onClick={()=>setShowAddGrade(true)}>+ Добавить оценку</Btn></div>
      </div>

      {view==='overview' && (
        <div className="space-y-5">
          {/* Child score cards */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {children.map(ch => {
              const avg = getChildAvgScore(ch);
              const subjects = getChildSubjectAverages(ch);
              const best = Object.entries(subjects).sort((a,b)=>b[1]-a[1])[0];
              const worst = Object.entries(subjects).sort((a,b)=>a[1]-b[1])[0];
              const c = COLORS[ch.color];
              return (
                <div key={ch.id} className={`bg-white rounded-xl p-4 border-l-4 ${c.border} shadow-sm cursor-pointer hover:shadow-md transition-shadow`}
                  onClick={()=>{setSelectedChild(ch.id);setView('individual');}}>
                  <div className="flex items-center gap-3 mb-3">
                    <Avatar child={ch} size="md"/>
                    <div>
                      <div className="font-semibold text-gray-800">{ch.name}</div>
                      <div className="text-xs text-gray-500">{ch.class}</div>
                    </div>
                    <div className="ml-auto">
                      <div className={`text-2xl font-bold ${avg>=4.5?'text-green-600':avg>=3.5?'text-blue-600':avg>=2.5?'text-amber-600':'text-red-600'}`}>{avg||'—'}</div>
                    </div>
                  </div>
                  <ProgressBar value={avg} max={5} color={avg>=4?'bg-green-500':avg>=3?'bg-amber-500':'bg-red-500'}/>
                  {best && <div className="text-xs text-gray-500 mt-2">🏆 {best[0]} · ⚠️ {worst[0]}</div>}
                </div>
              );
            })}
          </div>

          {/* Recent grades table */}
          <div className="bg-white rounded-xl shadow-sm overflow-hidden">
            <div className="p-4 border-b border-gray-100"><h3 className="font-semibold text-gray-800">Последние оценки</h3></div>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead className="bg-gray-50">
                  <tr>
                    {['Дата','Ребёнок','Предмет','Оценка','Тип работы'].map(h=>(
                      <th key={h} className="px-4 py-2 text-xs font-medium text-gray-500 text-left">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-50">
                  {allGrades.slice(0,15).map(g => {
                    const c = COLORS[g.childColor];
                    return (
                      <tr key={g.id} className="hover:bg-gray-50">
                        <td className="px-4 py-2 text-xs text-gray-500">{formatDate(g.date)}</td>
                        <td className="px-4 py-2">
                          <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${c.light} ${c.text}`}>{g.childName}</span>
                        </td>
                        <td className="px-4 py-2 text-sm text-gray-700">{g.subject}</td>
                        <td className="px-4 py-2"><ScoreBadge score={g.score}/></td>
                        <td className="px-4 py-2 text-xs text-gray-500">{g.workType}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {view==='individual' && child && (
        <div className="space-y-5">
          {/* Child selector */}
          <div className="flex items-center gap-3 bg-white rounded-xl p-3 shadow-sm">
            {children.map(ch=><Avatar key={ch.id} child={ch} active={ch.id===child.id} onClick={()=>setSelectedChild(ch.id)}/>)}
            <span className="ml-2 font-semibold text-gray-700">{child.name}</span>
          </div>

          {/* Summary */}
          {(() => {
            const avg = getChildAvgScore(child);
            const subjects = getChildSubjectAverages(child);
            const sorted = Object.entries(subjects).sort((a,b)=>b[1]-a[1]);
            const best = sorted[0];
            const worst = sorted[sorted.length-1];
            return (
              <div className="grid grid-cols-3 gap-4">
                <div className="bg-white rounded-xl p-4 shadow-sm text-center">
                  <div className={`text-3xl font-bold mb-1 ${avg>=4.5?'text-green-600':avg>=3.5?'text-blue-600':'text-amber-600'}`}>{avg||'—'}</div>
                  <div className="text-xs text-gray-500">Средний балл</div>
                </div>
                <div className="bg-green-50 rounded-xl p-4 shadow-sm text-center">
                  <div className="text-sm font-semibold text-green-700">🏆 {best?.[0]||'—'}</div>
                  <div className="text-xs text-green-600 mt-1">Лучший предмет</div>
                </div>
                <div className="bg-amber-50 rounded-xl p-4 shadow-sm text-center">
                  <div className="text-sm font-semibold text-amber-700">⚠️ {worst?.[0]||'—'}</div>
                  <div className="text-xs text-amber-600 mt-1">Требует внимания</div>
                </div>
              </div>
            );
          })()}

          {/* Subjects */}
          <div className="bg-white rounded-xl p-5 shadow-sm">
            <h3 className="font-semibold text-gray-800 mb-4">По предметам</h3>
            {Object.entries(getChildSubjectAverages(child)).length===0 && <p className="text-sm text-gray-400">Оценок нет</p>}
            <div className="space-y-3">
              {Object.entries(getChildSubjectAverages(child)).map(([subj,avg])=>(
                <div key={subj}>
                  <div className="flex justify-between text-sm mb-1">
                    <span className="text-gray-700">{subj}</span>
                    <span className={`font-semibold ${avg>=4.5?'text-green-600':avg>=3.5?'text-blue-600':avg>=2.5?'text-amber-600':'text-red-600'}`}>{avg}</span>
                  </div>
                  <ProgressBar value={avg} max={5} color={avg>=4?'bg-green-500':avg>=3?'bg-amber-500':'bg-red-500'}/>
                </div>
              ))}
            </div>
          </div>

          {/* Grades history */}
          <div className="bg-white rounded-xl shadow-sm overflow-hidden">
            <div className="p-4 border-b border-gray-100"><h3 className="font-semibold text-gray-800">История оценок</h3></div>
            {child.grades.length===0 && <p className="p-4 text-sm text-gray-400">Оценок нет</p>}
            <div className="divide-y divide-gray-50">
              {[...child.grades].sort((a,b)=>b.date.localeCompare(a.date)).map(g=>(
                <div key={g.id} className="flex items-center gap-3 px-4 py-2 hover:bg-gray-50">
                  <span className="text-xs text-gray-400 w-24">{formatDate(g.date)}</span>
                  <span className="flex-1 text-sm text-gray-700">{g.subject}</span>
                  <span className="text-xs text-gray-500">{g.workType}</span>
                  <ScoreBadge score={g.score}/>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {showAddGrade && (
        <AddGradeModal children={children} selectedChild={child?.id} onClose={()=>setShowAddGrade(false)} onSave={(childId, data)=>{
          const grade = { id:uid(), ...data };
          updateChild(childId, c=>({...c, grades:[grade,...c.grades]}));
          setShowAddGrade(false);
          toast('Оценка добавлена ✓');
        }}/>
      )}
    </div>
  );
}

// TAB: BUDGET
// ═══════════════════════════════════════════════════════════════════════════════
function BudgetTab({ children, toast }) {
  const [expenses, setExpenses] = useState(INITIAL_EXPENSES);
  const [showAdd, setShowAdd] = useState(false);

  const thisMonth = new Date().toISOString().slice(0,7);
  const monthExpenses = expenses.filter(e=>e.date.startsWith(thisMonth));

  const totalPaid = monthExpenses.filter(e=>e.status==='paid').reduce((s,e)=>s+e.amount,0);
  const totalPending = monthExpenses.filter(e=>e.status==='pending').reduce((s,e)=>s+e.amount,0);
  const totalOverdue = monthExpenses.filter(e=>e.status==='overdue').reduce((s,e)=>s+e.amount,0);
  const total = totalPaid+totalPending+totalOverdue;

  // By child
  const byChild = children.map(ch => ({
    child: ch,
    amount: monthExpenses.filter(e=>e.childId===ch.id).reduce((s,e)=>s+e.amount,0),
  }));

  // By category
  const byCat = {};
  monthExpenses.forEach(e => { byCat[e.category] = (byCat[e.category]||0)+e.amount; });

  // Upcoming (pending/overdue)
  const upcoming = [...expenses].filter(e=>e.status!=='paid').sort((a,b)=>a.date.localeCompare(b.date));

  function fmt(n) { return n.toLocaleString('ru-RU')+'₸'; }

  function addExpense(data) {
    setExpenses(prev=>[{ id:uid(), ...data }, ...prev]);
    setShowAdd(false);
    toast('Расход добавлен ✓');
  }

  return (
    <div className="space-y-5">
      {/* Summary row */}
      <div className="grid grid-cols-3 gap-4">
        {[
          {label:'Оплачено',value:totalPaid,color:'text-green-600',bg:'bg-green-50 border-green-200'},
          {label:'Ожидается',value:totalPending,color:'text-amber-600',bg:'bg-amber-50 border-amber-200'},
          {label:'Просрочено',value:totalOverdue,color:'text-red-600',bg:'bg-red-50 border-red-200'},
        ].map(({label,value,color,bg})=>(
          <div key={label} className={`rounded-xl border p-4 shadow-sm ${bg}`}>
            <div className={`text-2xl font-bold ${color}`}>{fmt(value)}</div>
            <div className="text-xs text-gray-600 mt-1">{label}</div>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
        {/* By child */}
        <div className="bg-white rounded-xl p-5 shadow-sm">
          <h3 className="font-semibold text-gray-800 mb-4">По детям</h3>
          {total===0 && <p className="text-sm text-gray-400">Нет расходов</p>}
          <div className="space-y-3">
            {byChild.map(({child:ch,amount})=>{
              const c=COLORS[ch.color];
              return (
                <div key={ch.id}>
                  <div className="flex justify-between text-sm mb-1">
                    <div className="flex items-center gap-2">
                      <Avatar child={ch} size="sm"/>
                      <span className="text-gray-700">{ch.name}</span>
                    </div>
                    <span className="font-semibold text-gray-800">{fmt(amount)}</span>
                  </div>
                  <ProgressBar value={amount} max={total||1} color={c.bg}/>
                </div>
              );
            })}
          </div>
        </div>

        {/* By category */}
        <div className="bg-white rounded-xl p-5 shadow-sm">
          <h3 className="font-semibold text-gray-800 mb-4">По категориям</h3>
          {Object.keys(byCat).length===0 && <p className="text-sm text-gray-400">Нет расходов</p>}
          <div className="space-y-3">
            {Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>(
              <div key={cat}>
                <div className="flex justify-between text-sm mb-1">
                  <span className="text-gray-700">{cat}</span>
                  <span className="font-semibold text-gray-800">{fmt(amt)}</span>
                </div>
                <ProgressBar value={amt} max={total||1} color="bg-blue-500"/>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Upcoming payments */}
      {upcoming.length>0 && (
        <div className="bg-white rounded-xl p-5 shadow-sm">
          <h3 className="font-semibold text-gray-800 mb-4">⏰ Предстоящие платежи</h3>
          <div className="space-y-2">
            {upcoming.map(e=>{
              const ch=children.find(c=>c.id===e.childId);
              return (
                <div key={e.id} className="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                  {ch&&<Avatar child={ch} size="sm"/>}
                  <span className="flex-1 text-sm text-gray-700">{e.category}{ch?` · ${ch.name}`:''}</span>
                  <span className="text-xs text-gray-500">{formatDate(e.date)}</span>
                  <span className="font-semibold text-sm text-gray-800">{fmt(e.amount)}</span>
                  <StatusBadge status={e.status}/>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Expenses table */}
      <div className="bg-white rounded-xl shadow-sm overflow-hidden">
        <div className="flex items-center justify-between p-4 border-b border-gray-100">
          <h3 className="font-semibold text-gray-800">Все расходы</h3>
          <Btn onClick={()=>setShowAdd(true)}>+ Расход</Btn>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full">
            <thead className="bg-gray-50">
              <tr>
                {['Дата','Ребёнок','Категория','Сумма','Статус'].map(h=>(
                  <th key={h} className="px-4 py-2 text-xs font-medium text-gray-500 text-left">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-50">
              {[...expenses].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>{
                const ch=children.find(c=>c.id===e.childId);
                return (
                  <tr key={e.id} className="hover:bg-gray-50">
                    <td className="px-4 py-2 text-xs text-gray-500">{formatDate(e.date)}</td>
                    <td className="px-4 py-2">
                      {ch&&<span className={`text-xs font-medium px-2 py-0.5 rounded-full ${COLORS[ch.color].light} ${COLORS[ch.color].text}`}>{ch.name}</span>}
                    </td>
                    <td className="px-4 py-2 text-sm text-gray-700">{e.category}</td>
                    <td className="px-4 py-2 text-sm font-semibold text-gray-800">{fmt(e.amount)}</td>
                    <td className="px-4 py-2"><StatusBadge status={e.status}/></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {showAdd && <AddExpenseModal children={children} onClose={()=>setShowAdd(false)} onSave={addExpense}/>}
    </div>
  );
}

// TAB: NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════════════════════
function NotificationsTab({ children, notifications, setNotifications, toast }) {
  const [showAdd, setShowAdd] = useState(false);

  const unread = notifications.filter(n=>!n.read).length;

  function markRead(id) { setNotifications(prev=>prev.map(n=>n.id===id?{...n,read:true}:n)); }
  function markAllRead() { setNotifications(prev=>prev.map(n=>({...n,read:true}))); toast('Все прочитаны ✓'); }

  function addNotification(data) {
    setNotifications(prev=>[{ id:uid(), ...data, time:'Только что', read:false }, ...prev]);
    setShowAdd(false);
    toast('Уведомление добавлено ✓');
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <div className="flex items-center gap-2">
          <h2 className="font-semibold text-gray-800">Уведомления от школ</h2>
          {unread>0&&<span className="bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">{unread}</span>}
        </div>
        <div className="flex gap-2">
          {unread>0&&<Btn variant="secondary" onClick={markAllRead}>Прочитать все</Btn>}
          <Btn onClick={()=>setShowAdd(true)}>+ Уведомление</Btn>
        </div>
      </div>

      <div className="space-y-3">
        {notifications.map(n=>{
          const ch=children.find(c=>c.id===n.childId);
          const c=ch?COLORS[ch.color]:COLORS.blue;
          return (
            <div key={n.id} className={`bg-white rounded-xl p-4 shadow-sm border transition-all ${n.read?'opacity-60 border-gray-100':'border-gray-200'}`}>
              <div className="flex items-start gap-3">
                <div className="text-2xl">{n.icon}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-1">
                    {ch&&<span className={`text-xs font-medium px-2 py-0.5 rounded-full ${c.light} ${c.text}`}>{n.school}</span>}
                    <span className="text-xs text-gray-400">{n.time}</span>
                    {!n.read&&<span className="w-2 h-2 bg-blue-500 rounded-full"/>}
                  </div>
                  <p className="text-sm text-gray-700">{n.text}</p>
                </div>
                {!n.read&&(
                  <button onClick={()=>markRead(n.id)} className="text-xs text-blue-500 hover:text-blue-700 whitespace-nowrap">✓ Прочитано</button>
                )}
              </div>
            </div>
          );
        })}
        {notifications.length===0&&<p className="text-gray-400 text-sm">Уведомлений нет</p>}
      </div>

      {showAdd&&<AddNotificationModal children={children} onClose={()=>setShowAdd(false)} onSave={addNotification}/>}
    </div>
  );
}

function SpouseTab({ toast }) {
  const [trips, setTrips] = useState(INITIAL_SPOUSE_TRIPS);
  const [showAdd, setShowAdd] = useState(false);
  const [spouseName, setSpouseName] = useState('Супруг');
  const [editName, setEditName] = useState(false);
  const [nameInput, setNameInput] = useState('Супруг');

  const upcoming = trips.filter(t=>t.status==='upcoming').sort((a,b)=>a.start.localeCompare(b.start));
  const done = trips.filter(t=>t.status==='done').sort((a,b)=>b.start.localeCompare(a.start));

  const totalDaysAway = trips.reduce((s,t)=>{
    return s + Math.ceil((isoToDate(t.end)-isoToDate(t.start))/(1000*60*60*24))+1;
  },0);

  const upcomingDays = upcoming.reduce((s,t)=>{
    return s + Math.ceil((isoToDate(t.end)-isoToDate(t.start))/(1000*60*60*24))+1;
  },0);

  function addTrip(data) {
    setTrips(prev=>[{ id:uid(), ...data }, ...prev]);
    setShowAdd(false);
    toast('Командировка добавлена ✓');
  }

  function removeTrip(id) {
    setTrips(prev=>prev.filter(t=>t.id!==id));
    toast('Командировка удалена');
  }

  function markDone(id) {
    setTrips(prev=>prev.map(t=>t.id===id?{...t,status:'done'}:t));
    toast('Отмечено как завершённое ✓');
  }

  // Next trip countdown
  const nextTrip = upcoming[0];
  const today = new Date().toISOString().slice(0,10);
  const daysToNext = nextTrip ? Math.ceil((isoToDate(nextTrip.start)-new Date())/(1000*60*60*24)) : null;

  return (
    <div className="space-y-5">
      {/* Header with name edit */}
      <div className="flex items-center gap-3">
        <div className="w-12 h-12 rounded-full bg-gray-700 text-white flex items-center justify-center text-xl font-bold">
          {spouseName[0]}
        </div>
        {editName ? (
          <div className="flex items-center gap-2">
            <input className="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
              value={nameInput} onChange={e=>setNameInput(e.target.value)} autoFocus/>
            <Btn sm onClick={()=>{setSpouseName(nameInput);setEditName(false);}}>Сохранить</Btn>
            <Btn sm variant="secondary" onClick={()=>setEditName(false)}>Отмена</Btn>
          </div>
        ) : (
          <div className="flex items-center gap-2">
            <h2 className="text-xl font-bold text-gray-800">{spouseName}</h2>
            <button onClick={()=>{setNameInput(spouseName);setEditName(true);}} className="text-gray-400 hover:text-gray-600 text-sm">✏️</button>
          </div>
        )}
        <div className="ml-auto">
          <Btn onClick={()=>setShowAdd(true)}>+ Командировка</Btn>
        </div>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-3 gap-4">
        <div className="bg-white rounded-xl p-4 shadow-sm text-center">
          <div className="text-3xl font-bold text-gray-800">{upcoming.length}</div>
          <div className="text-xs text-gray-500 mt-1">Предстоящих поездок</div>
        </div>
        <div className="bg-blue-50 rounded-xl p-4 shadow-sm text-center">
          <div className="text-3xl font-bold text-blue-700">{upcomingDays}</div>
          <div className="text-xs text-blue-600 mt-1">Дней в командировках</div>
        </div>
        <div className="bg-gray-50 rounded-xl p-4 shadow-sm text-center">
          <div className="text-3xl font-bold text-gray-600">{done.length}</div>
          <div className="text-xs text-gray-500 mt-1">Завершено поездок</div>
        </div>
      </div>

      {/* Next trip alert */}
      {nextTrip && (
        <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-center gap-4">
          <div className="text-3xl">✈️</div>
          <div className="flex-1">
            <div className="font-semibold text-amber-800">Следующая командировка — {nextTrip.city}</div>
            <div className="text-sm text-amber-700">{nextTrip.purpose} · {formatDate(nextTrip.start)} — {formatDate(nextTrip.end)}</div>
          </div>
          <div className="text-right">
            <div className="text-2xl font-bold text-amber-700">{daysToNext <= 0 ? 'Сегодня' : `${daysToNext}д`}</div>
            <div className="text-xs text-amber-600">{daysToNext > 0 ? 'до отъезда' : ''}</div>
          </div>
        </div>
      )}

      {/* Upcoming trips */}
      <div className="bg-white rounded-xl shadow-sm overflow-hidden">
        <div className="p-4 border-b border-gray-100">
          <h3 className="font-semibold text-gray-800">🗓 Предстоящие командировки</h3>
        </div>
        {upcoming.length === 0 && <p className="p-4 text-sm text-gray-400">Нет запланированных командировок</p>}
        <div className="divide-y divide-gray-50">
          {upcoming.map(t => {
            const days = Math.ceil((isoToDate(t.end)-isoToDate(t.start))/(1000*60*60*24))+1;
            return (
              <div key={t.id} className="flex items-center gap-4 px-4 py-3 hover:bg-gray-50">
                <div className="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center text-lg">🏙️</div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-gray-800">{t.city}</div>
                  <div className="text-sm text-gray-500">{t.purpose}</div>
                </div>
                <div className="text-right text-sm">
                  <div className="text-gray-700 font-medium">{formatDate(t.start)} — {formatDate(t.end)}</div>
                  <div className="text-gray-400 text-xs">{days} {days===1?'день':days<5?'дня':'дней'}</div>
                </div>
                <div className="flex gap-1">
                  <Btn sm variant="success" onClick={()=>markDone(t.id)}>✓</Btn>
                  <Btn sm variant="danger" onClick={()=>removeTrip(t.id)}>×</Btn>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Past trips */}
      {done.length > 0 && (
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="p-4 border-b border-gray-100">
            <h3 className="font-semibold text-gray-800">✅ Завершённые командировки</h3>
          </div>
          <div className="divide-y divide-gray-50">
            {done.map(t => {
              const days = Math.ceil((isoToDate(t.end)-isoToDate(t.start))/(1000*60*60*24))+1;
              return (
                <div key={t.id} className="flex items-center gap-4 px-4 py-3 opacity-60 hover:opacity-80">
                  <div className="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center text-lg">🏙️</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-medium text-gray-700">{t.city}</div>
                    <div className="text-sm text-gray-500">{t.purpose}</div>
                  </div>
                  <div className="text-right text-sm">
                    <div className="text-gray-600">{formatDate(t.start)} — {formatDate(t.end)}</div>
                    <div className="text-gray-400 text-xs">{days} {days===1?'день':days<5?'дня':'дней'}</div>
                  </div>
                  <Btn sm variant="danger" onClick={()=>removeTrip(t.id)}>×</Btn>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Add trip modal */}
      {showAdd && (
        <Modal title="Добавить командировку" onClose={()=>setShowAdd(false)}>
          <AddSpouseTripForm onClose={()=>setShowAdd(false)} onSave={addTrip}/>
        </Modal>
      )}
    </div>
  );
}

function AddSpouseTripForm({ onClose, onSave }) {
  const [form, setForm] = useState({ city:'', purpose:'', start:'', end:'', status:'upcoming' });
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  return (
    <div className="space-y-3">
      <div><Label>Город / страна</Label><Input value={form.city} onChange={set('city')} placeholder="Астана"/></div>
      <div><Label>Цель поездки</Label><Input value={form.purpose} onChange={set('purpose')} placeholder="Конференция"/></div>
      <div className="grid grid-cols-2 gap-3">
        <div><Label>Дата отъезда</Label><Input type="date" value={form.start} onChange={set('start')}/></div>
        <div><Label>Дата возврата</Label><Input type="date" value={form.end} onChange={set('end')}/></div>
      </div>
      <div><Label>Статус</Label>
        <Select value={form.status} onChange={set('status')}>
          <option value="upcoming">Предстоящая</option>
          <option value="done">Завершённая</option>
        </Select>
      </div>
      <div className="flex gap-2 pt-2">
        <Btn onClick={()=>{ if(form.city&&form.start&&form.end) onSave(form); }}>Добавить</Btn>
        <Btn variant="secondary" onClick={onClose}>Отмена</Btn>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [children, setChildren] = useState(INITIAL_CHILDREN);
  const [notifications, setNotifications] = useState(INITIAL_NOTIFICATIONS);
  const [activeTab, setActiveTab] = useState('schedule');
  const [selectedChild, setSelectedChild] = useState(INITIAL_CHILDREN[0].id);
  const [showAddChild, setShowAddChild] = useState(false);
  const [toastMsg, setToastMsg] = useState(null);

  function toast(msg) { setToastMsg(msg); }

  function updateChild(id, fn) {
    setChildren(prev => prev.map(c => c.id===id ? fn(c) : c));
  }

  function addChild(data) {
    const child = {
      id: uid(), ...data, age: parseInt(data.age)||0,
      lessons:[], grades:[], vacations:[],
      accessLevel:'view', accessToken:`tok-${uid()}`,
    };
    setChildren(prev=>[...prev, child]);
    setSelectedChild(child.id);
    setShowAddChild(false);
    toast('Профиль ребёнка создан ✓');
  }

  const unreadCount = notifications.filter(n=>!n.read).length;

  const TABS = [
    { id:'schedule',    label:'Расписание',       icon:'📅' },
    { id:'vacations',   label:'Каникулы & Отпуск', icon:'🏖️' },
    { id:'grades',      label:'Успеваемость',      icon:'📊' },
    { id:'budget',      label:'Бюджет',            icon:'💰' },
    { id:'spouse',      label:'Супруг',            icon:'✈️' },
    { id:'notifications',label:'Уведомления',      icon:'🔔', badge: unreadCount },
  ];

  return (
    <div className="min-h-screen bg-slate-50">
      {/* Header */}
      <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-30">
        <div className="max-w-6xl mx-auto px-4">
          <div className="flex items-center h-14 gap-4">
            <div className="flex items-center gap-2">
              <span className="text-xl">🏠</span>
              <span className="font-bold text-gray-800 text-sm hidden sm:block">Семейный планировщик</span>
            </div>

            {/* Child avatars */}
            <div className="flex items-center gap-2 ml-2">
              {children.map(ch=>(
                <Avatar key={ch.id} child={ch} active={ch.id===selectedChild}
                  onClick={()=>setSelectedChild(ch.id)}/>
              ))}
              <button onClick={()=>setShowAddChild(true)}
                className="w-10 h-10 rounded-full border-2 border-dashed border-gray-300 text-gray-400 hover:border-blue-400 hover:text-blue-500 text-xl flex items-center justify-center transition-colors">
                +
              </button>
            </div>

            {/* Selected child info */}
            <div className="hidden md:block ml-2">
              {(() => {
                const ch = children.find(c=>c.id===selectedChild);
                if (!ch) return null;
                const c = COLORS[ch.color];
                return (
                  <div className={`text-xs px-3 py-1 rounded-full ${c.light} ${c.text} font-medium`}>
                    {ch.name} · {ch.class} · {ch.school}
                  </div>
                );
              })()}
            </div>
          </div>

          {/* Tab navigation */}
          <div className="flex overflow-x-auto -mb-px">
            {TABS.map(tab=>(
              <button key={tab.id} onClick={()=>setActiveTab(tab.id)}
                className={`flex items-center gap-1.5 px-4 py-3 text-sm font-medium border-b-2 whitespace-nowrap transition-colors relative ${
                  activeTab===tab.id ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'
                }`}>
                <span>{tab.icon}</span>
                <span className="hidden sm:inline">{tab.label}</span>
                {tab.badge > 0 && (
                  <span className="absolute -top-0.5 right-1 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center">{tab.badge}</span>
                )}
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* Main content */}
      <main className="max-w-6xl mx-auto px-4 py-6">
        {activeTab==='schedule' && (
          <ScheduleTab children={children} selectedChild={selectedChild} setSelectedChild={setSelectedChild} updateChild={updateChild} toast={toast}/>
        )}
        {activeTab==='vacations' && (
          <VacationsTab children={children} updateChild={updateChild} toast={toast}/>
        )}
        {activeTab==='grades' && (
          <GradesTab children={children} selectedChild={selectedChild} setSelectedChild={setSelectedChild} updateChild={updateChild} toast={toast}/>
        )}
        {activeTab==='budget' && (
          <BudgetTab children={children} toast={toast}/>
        )}
        {activeTab==='spouse' && (
          <SpouseTab toast={toast}/>
        )}
        {activeTab==='notifications' && (
          <NotificationsTab children={children} notifications={notifications} setNotifications={setNotifications} toast={toast}/>
        )}
      </main>

      {/* Add child modal */}
      {showAddChild && <AddChildModal onClose={()=>setShowAddChild(false)} onSave={addChild}/>}

      {/* Toast */}
      {toastMsg && <Toast msg={toastMsg} onDone={()=>setToastMsg(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
