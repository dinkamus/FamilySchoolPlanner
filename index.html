// ═══════════════════════════════════════════════════════════════════════════════
// WEBAUTHN — Face ID / Touch ID / Windows Hello
// ═══════════════════════════════════════════════════════════════════════════════
const PASSKEY_STORE = 'fsp_passkeys'; // { email: credentialId(base64) }

function getPasskeys() { try { return JSON.parse(localStorage.getItem(PASSKEY_STORE)||'{}'); } catch { return {}; } }
function savePasskeys(p) { localStorage.setItem(PASSKEY_STORE, JSON.stringify(p)); }

function passkeySupported() {
  return !!(window.PublicKeyCredential && navigator.credentials && navigator.credentials.create);
}

function base64url(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function fromBase64url(str) {
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  return Uint8Array.from(atob(str), c=>c.charCodeAt(0));
}

async function registerPasskey(userId, displayName) {
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const rp = { name: 'Семейный планировщик', id: location.hostname };
  const user = {
    id: new TextEncoder().encode(userId),
    name: displayName,
    displayName,
  };
  const credential = await navigator.credentials.create({
    publicKey: {
      challenge,
      rp,
      user,
      pubKeyCredParams: [
        { alg: -7, type: 'public-key' },   // ES256
        { alg: -257, type: 'public-key' },  // RS256
      ],
      authenticatorSelection: {
        authenticatorAttachment: 'platform',
        userVerification: 'required',
        residentKey: 'preferred',
      },
      timeout: 60000,
    },
  });
  const credId = base64url(credential.rawId);
  const passkeys = getPasskeys();
  passkeys[userId] = credId;
  savePasskeys(passkeys);
  return credId;
}

async function authenticateWithPasskey(userId) {
  const passkeys = getPasskeys();
  const credId = passkeys[userId];
  if (!credId) return null;
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const assertion = await navigator.credentials.get({
    publicKey: {
      challenge,
      allowCredentials: [{ id: fromBase64url(credId), type: 'public-key' }],
      userVerification: 'required',
      timeout: 60000,
    },
  });
  return assertion ? userId : null;
}

// Find which userId has a passkey registered
function getPasskeyUser() {
  const passkeys = getPasskeys();
  const users = getUsers();
  for (const [userId, credId] of Object.entries(passkeys)) {
    const user = users.find(u=>u.id===userId);
    if (user) return { userId, email: user.email };
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════════
// AUTH — Web Crypto + localStorage
// ═══════════════════════════════════════════════════════════════════════════════
async function hashPassword(password) {
  const msgBuffer = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const AUTH_KEY = 'fsp_users';
const SESSION_KEY = 'fsp_session';
const SESSION_TTL = 30 * 24 * 60 * 60 * 1000; // 30 дней

function getUsers() {
  try { return JSON.parse(localStorage.getItem(AUTH_KEY) || '[]'); } catch { return []; }
}
function saveUsers(users) { localStorage.setItem(AUTH_KEY, JSON.stringify(users)); }
function getSession() {
  try {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    if (!s) return null;
    // Проверяем срок — 30 дней
    if (s.expiresAt && Date.now() > s.expiresAt) { localStorage.removeItem(SESSION_KEY); return null; }
    return s;
  } catch { return null; }
}
function saveSession(user) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({ ...user, expiresAt: Date.now() + SESSION_TTL }));
}
function clearSession() { localStorage.removeItem(SESSION_KEY); }

const ALLOWED_EMAILS = Object.keys(USER_ROLES);

// PIN — 4 цифры, хранятся хешем
async function registerUser(name, email, pin) {
  const normalEmail = email.toLowerCase().trim();
  if (!ALLOWED_EMAILS.includes(normalEmail))
    return { error: 'Нет доступа.' };
  const users = getUsers();
  if (users.find(u => u.email === normalEmail))
    return { error: 'Уже зарегистрирован' };
  const hash = await hashPassword(pin);
  const roleInfo = USER_ROLES[normalEmail];
  const user = { id: 'u-' + Date.now(), name: roleInfo.label, email: normalEmail, hash };
  saveUsers([...users, user]);
  const session = { id: user.id, name: roleInfo.label, email: normalEmail, role: roleInfo.role, childId: roleInfo.childId };
  saveSession(session);
  return { user: session };
}

async function loginUser(email, pin) {
  const normalEmail = email.toLowerCase().trim();
  if (!ALLOWED_EMAILS.includes(normalEmail))
    return { error: 'Нет доступа.' };
  const users = getUsers();
  const user = users.find(u => u.email === normalEmail);
  if (!user) return { error: 'not_registered' };
  const hash = await hashPassword(pin);
  if (hash !== user.hash) return { error: 'wrong_pin' };
  const roleInfo = USER_ROLES[normalEmail];
  const session = { id: user.id, name: roleInfo.label, email: normalEmail, role: roleInfo.role, childId: roleInfo.childId };
  saveSession(session);
  return { user: session };
}

// Google Sign-In: автоматически регистрирует если email в whitelist, иначе ошибка
async function loginWithGoogle(googleUser) {
  const normalEmail = googleUser.email.toLowerCase().trim();
  if (!ALLOWED_EMAILS.includes(normalEmail))
    return { error: `Аккаунт ${googleUser.email} не имеет доступа. Обратитесь к администратору.` };
  const roleInfo = USER_ROLES[normalEmail];
  const users = getUsers();
  let user = users.find(u => u.email === normalEmail);
  if (!user) {
    // Auto-register Google user (no password needed)
    user = { id: 'u-' + Date.now(), name: roleInfo.label, email: normalEmail, hash: 'google-auth', avatar: googleUser.picture };
    saveUsers([...users, user]);
  }
  const session = { id: user.id, name: roleInfo.label, email: normalEmail, role: roleInfo.role, childId: roleInfo.childId, avatar: googleUser.picture };
  saveSession(session);
  return { user: session };
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
let idCounter = 1000;
const uid = () => `id-${++idCounter}-${Math.random().toString(36).slice(2,7)}`;

function avg(arr) { return arr.length ? (arr.reduce((s,v)=>s+v,0)/arr.length) : 0; }

// Умная подпись места учёбы
function schoolTypeLabel(school, cls) {
  const s = (school||'').toLowerCase();
  const c = (cls||'').toLowerCase();
  if (s.includes('university') || s.includes('uci') || s.includes('ucl') || c==='университет') return 'Университет';
  if (s.includes('spectrum') || s.includes('садик') || c==='садик') return 'Садик';
  if (s.includes('college') || s.includes('колледж')) return 'Колледж';
  return 'Школа';
}
function classLabel(school, cls) {
  const type = schoolTypeLabel(school, cls);
  if (type==='Университет') return 'Вуз';
  if (type==='Садик') return 'Садик';
  if (type==='Колледж') return 'Колледж';
  return cls || '—';
}

function getChildSubjectAverages(child) {
  const map = {};
  child.grades.forEach(g => {
    if (!map[g.subject]) map[g.subject] = [];
    map[g.subject].push(g.score);
  });
  const result = {};
  Object.keys(map).forEach(s => result[s] = parseFloat(avg(map[s]).toFixed(2)));
  return result;
}

function getChildAvgScore(child) {
  if (!child.grades.length) return 0;
  return parseFloat(avg(child.grades.map(g=>g.score)).toFixed(2));
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU');
}

function isoToDate(iso) { return new Date(iso + 'T00:00:00'); }

function getDaysInMonth(year, month) { return new Date(year, month+1, 0).getDate(); }

function getFirstDayOfMonth(year, month) {
  const d = new Date(year, month, 1).getDay();
  return d === 0 ? 6 : d - 1; // Monday=0
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return ()=>clearTimeout(t); }, []);
  return (
    <div className="toast fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-medium">
      {msg}
    </div>
  );
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children, wide }) {
  useEffect(() => {
    const esc = e => { if (e.key==='Escape') onClose(); };
    document.addEventListener('keydown', esc);
    return () => document.removeEventListener('keydown', esc);
  }, []);
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
      <div className={`bg-white rounded-2xl shadow-2xl w-full ${wide?'max-w-2xl':'max-w-md'} max-h-[90vh] overflow-y-auto`}>
        <div className="flex items-center justify-between p-5 border-b border-gray-100">
          <h2 className="text-lg font-semibold text-gray-800">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

// ─── FORM HELPERS ─────────────────────────────────────────────────────────────
function Label({ children }) { return <label className="block text-sm font-medium text-gray-700 mb-1">{children}</label>; }
function Input({ ...p }) { return <input className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" {...p}/>; }
function Select({ children, ...p }) { return <select className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" {...p}>{children}</select>; }
function Btn({ children, variant='primary', sm, ...p }) {
  const base = 'font-medium rounded-lg transition-all focus:outline-none';
  const size = sm ? 'px-3 py-1.5 text-xs' : 'px-4 py-2 text-sm';
  const v = {
    primary: 'bg-blue-600 hover:bg-blue-700 text-white',
    secondary: 'bg-gray-100 hover:bg-gray-200 text-gray-700',
    danger: 'bg-red-50 hover:bg-red-100 text-red-600',
    success: 'bg-green-600 hover:bg-green-700 text-white',
  };
  return <button className={`${base} ${size} ${v[variant]}`} {...p}>{children}</button>;
}

// ─── CHILD AVATAR ─────────────────────────────────────────────────────────────
function Avatar({ child, size='md', onClick, active }) {
  const c = COLORS[child.color];
  const sz = size==='sm' ? 'w-8 h-8 text-xs' : 'w-10 h-10 text-sm';
  const ring = active ? 'ring-2 ring-offset-2 ring-gray-800 scale-110' : 'ring-2 ring-transparent hover:scale-105';
  return (
    <button onClick={onClick} title={child.name}
      className={`${sz} rounded-full overflow-hidden flex items-center justify-center transition-all ${ring} flex-shrink-0`}>
      {child.photo ? (
        <img src={child.photo} alt={child.name} className="w-full h-full object-cover"/>
      ) : child.emoji ? (
        <span className={`${c.bg} w-full h-full flex items-center justify-center text-lg`}>{child.emoji}</span>
      ) : (
        <span className={`${c.bg} text-white font-bold w-full h-full flex items-center justify-center`}>{child.name[0]}</span>
      )}
    </button>
  );
}

// ─── SCORE BADGE ──────────────────────────────────────────────────────────────
function ScoreBadge({ score }) {
  const colors = { 5:'bg-green-100 text-green-700', 4:'bg-blue-100 text-blue-700', 3:'bg-amber-100 text-amber-700', 2:'bg-red-100 text-red-700' };
  return <span className={`${colors[score]||'bg-gray-100 text-gray-700'} px-2 py-0.5 rounded-full text-xs font-bold`}>{score}</span>;
}

// ─── STATUS BADGE ─────────────────────────────────────────────────────────────
function StatusBadge({ status }) {
  const map = { paid:'bg-green-100 text-green-700', pending:'bg-amber-100 text-amber-700', overdue:'bg-red-100 text-red-700' };
  const labels = { paid:'Оплачено', pending:'Ожидается', overdue:'Просрочено' };
  return <span className={`${map[status]} px-2 py-0.5 rounded-full text-xs font-medium`}>{labels[status]}</span>;
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────────
function ProgressBar({ value, max, color='bg-blue-500' }) {
  const pct = max ? Math.min(100, Math.round(value/max*100)) : 0;
  return (
    <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
      <div className={`h-full ${color} progress-bar rounded-full`} style={{width:`${pct}%`}}/>
    </div>
  );
}

function ScheduleTab({ children, selectedChild, setSelectedChild, updateChild, toast }) {
  const [view, setView] = useState('overview'); // overview | individual
  const [showAddLesson, setShowAddLesson] = useState(false);
  const [showChangeRequests, setShowChangeRequests] = useState(false);
  const [changeRequests, setChangeRequests] = useState(INITIAL_CHANGE_REQUESTS);

  const child = children.find(c=>c.id===selectedChild) || children[0];

  const today = new Date();
  const todayDay = today.getDay() === 0 ? 6 : today.getDay() - 1; // 0=Mon

  // Lessons today across all children
  const todayLessons = [];
  children.forEach(ch => {
    ch.lessons.filter(l=>l.day===todayDay).forEach(l => {
      todayLessons.push({ ...l, childName: ch.name, childColor: ch.color, school: ch.school });
    });
  });
  todayLessons.sort((a,b) => a.row - b.row);

  function addLesson(data) {
    const lesson = { id: uid(), ...data };
    updateChild(child.id, c => ({ ...c, lessons: [...c.lessons, lesson] }));
    setShowAddLesson(false);
    toast('Урок добавлен ✓');
  }

  function removeLesson(lessonId) {
    updateChild(child.id, c => ({ ...c, lessons: c.lessons.filter(l=>l.id!==lessonId) }));
    toast('Урок удалён');
  }

  function approveRequest(id, approve) {
    setChangeRequests(prev => prev.map(r => r.id===id ? { ...r, status: approve?'approved':'declined' } : r));
    toast(approve ? 'Запрос одобрен ✓' : 'Запрос отклонён');
  }

  const pendingRequests = changeRequests.filter(r=>r.status==='pending');

  return (
    <div>
      {/* Sub-nav */}
      <div className="flex gap-2 mb-5">
        <Btn variant={view==='overview'?'primary':'secondary'} onClick={()=>setView('overview')}>Обзор всех детей</Btn>
        <Btn variant={view==='individual'?'primary':'secondary'} onClick={()=>setView('individual')}>Расписание ребёнка</Btn>
        <div className="ml-auto flex items-center gap-2">
          {pendingRequests.length > 0 && (
            <button onClick={()=>setShowChangeRequests(true)} className="relative bg-amber-50 border border-amber-200 text-amber-700 rounded-lg px-3 py-1.5 text-sm font-medium hover:bg-amber-100">
              Запросы
              <span className="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">{pendingRequests.length}</span>
            </button>
          )}
        </div>
      </div>

      {view === 'overview' && (
        <div>
          {/* Child cards */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            {children.map(ch => {
              const c = COLORS[ch.color];
              const todayCount = ch.lessons.filter(l=>l.day===todayDay).length;
              return (
                <div key={ch.id} className={`bg-white rounded-xl p-4 border-l-4 ${c.border} shadow-sm cursor-pointer hover:shadow-md transition-shadow`}
                  onClick={() => { setSelectedChild(ch.id); setView('individual'); }}>
                  <div className="flex items-center gap-3 mb-2">
                    <Avatar child={ch} size="md" />
                    <div>
                      <div className="font-semibold text-gray-800">{ch.name}</div>
                      <div className="text-xs text-gray-500">{schoolTypeLabel(ch.school,ch.class)} · {ch.school}{ch.class&&ch.class!=='Университет'&&ch.class!=='Садик'?` · ${ch.class}`:''}</div>
                    </div>
                  </div>
                  <div className="text-xs text-gray-500">Сегодня уроков: <span className="font-semibold text-gray-700">{todayCount}</span></div>
                </div>
              );
            })}
          </div>

          {/* Today's lessons */}
          <div className="bg-white rounded-xl p-5 shadow-sm">
            <h3 className="font-semibold text-gray-800 mb-4">📅 Уроки сегодня — {DAYS[todayDay] || 'Выходной'}</h3>
            {todayLessons.length === 0 ? (
              <p className="text-gray-400 text-sm">Сегодня уроков нет или выходной день</p>
            ) : (
              <div className="space-y-2">
                {todayLessons.map((l,i) => {
                  const c = COLORS[l.childColor];
                  return (
                    <div key={i} className="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                      <span className="text-xs font-mono text-gray-500 w-12">{TIME_SLOTS[l.row]}</span>
                      <span className={`w-2 h-2 rounded-full ${c.bg}`}/>
                      <span className="flex-1 text-sm font-medium text-gray-800">{l.name}</span>
                      <span className="text-xs text-gray-500">{l.childName}</span>
                      <span className={`text-xs px-2 py-0.5 rounded-full border ${LESSON_TYPES[l.type].color}`}>{LESSON_TYPES[l.type].label}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {view === 'individual' && child && (
        <div>
          {/* Child selector */}
          <div className="flex items-center gap-3 mb-5 bg-white rounded-xl p-3 shadow-sm">
            {children.map(ch => <Avatar key={ch.id} child={ch} active={ch.id===child.id} onClick={()=>setSelectedChild(ch.id)}/>)}
            <span className="ml-2 font-semibold text-gray-700">{child.name} {child.surname} — {child.class}</span>
            <div className="ml-auto">
              <Btn onClick={()=>setShowAddLesson(true)}>+ Добавить урок</Btn>
            </div>
          </div>

          {/* Weekly grid */}
          <div className="bg-white rounded-xl shadow-sm overflow-x-auto">
            <table className="w-full min-w-[600px]">
              <thead>
                <tr>
                  <th className="w-20 p-3 text-xs font-medium text-gray-500 border-b border-gray-100 text-left">Время</th>
                  {DAYS.map(d => <th key={d} className="p-3 text-xs font-medium text-gray-600 border-b border-gray-100 text-center">{d}</th>)}
                </tr>
              </thead>
              <tbody>
                {TIME_SLOTS.map((time, row) => (
                  <tr key={row} className="hover:bg-gray-50">
                    <td className="p-3 text-xs font-mono text-gray-400 border-b border-gray-50">{time}</td>
                    {DAYS.map((_, day) => {
                      const lesson = child.lessons.find(l=>l.row===row && l.day===day);
                      return (
                        <td key={day} className="p-2 border-b border-gray-50 text-center">
                          {lesson ? (
                            <div className={`rounded-lg px-2 py-1.5 text-xs border cursor-pointer group relative ${LESSON_TYPES[lesson.type].color}`}>
                              <div className="font-medium">{lesson.name}</div>
                              <div className="text-xs opacity-70">{LESSON_TYPES[lesson.type].label}</div>
                              <button onClick={()=>removeLesson(lesson.id)}
                                className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs hidden group-hover:flex items-center justify-center">×</button>
                            </div>
                          ) : <div className="h-8"/>}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Legend */}
          <div className="flex flex-wrap gap-3 mt-3">
            {Object.entries(LESSON_TYPES).map(([k,v]) => (
              <div key={k} className={`flex items-center gap-1.5 px-2 py-1 rounded-full text-xs border ${v.color}`}>
                <span className="w-2 h-2 rounded-full bg-current opacity-60"/>
                {v.label}
              </div>
            ))}
          </div>

          {/* School portal link */}
          {child.portalUrl && (
            <div className="mt-3 bg-purple-50 border border-purple-200 rounded-xl p-4 flex items-center justify-between gap-3">
              <div>
                <div className="text-sm font-semibold text-purple-800">🏫 Портал {child.school}</div>
                <div className="text-xs text-purple-600 mt-0.5">Официальное расписание и уведомления школы</div>
              </div>
              <a href={child.portalUrl} target="_blank" rel="noopener noreferrer"
                className="bg-purple-600 hover:bg-purple-700 text-white text-xs font-semibold px-4 py-2 rounded-xl transition-colors whitespace-nowrap">
                Открыть портал →
              </a>
            </div>
          )}

          {/* Access link */}
          <div className="mt-3 bg-blue-50 border border-blue-200 rounded-xl p-4">
            <div className="flex items-center justify-between flex-wrap gap-2">
              <div>
                <div className="text-sm font-medium text-blue-800">Ссылка для {child.name}</div>
                <div className="text-xs text-blue-600 font-mono mt-0.5">planifier.app/child/{child.accessToken}</div>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-blue-700">Доступ:</span>
                <span className="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full font-medium">
                  {{ view:'Только просмотр', suggest:'Может предлагать', full:'Полный доступ' }[child.accessLevel]}
                </span>
                <Btn sm variant="secondary" onClick={()=>{navigator.clipboard?.writeText(`planifier.app/child/${child.accessToken}`); toast('Ссылка скопирована ✓');}}>Копировать</Btn>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Add Lesson Modal */}
      {showAddLesson && (
        <AddLessonModal onClose={()=>setShowAddLesson(false)} onSave={addLesson}/>
      )}

      {/* Change Requests Modal */}
      {showChangeRequests && (
        <Modal title="Запросы на изменение расписания" onClose={()=>setShowChangeRequests(false)}>
          <div className="space-y-3">
            {changeRequests.map(r => {
              const ch = children.find(c=>c.id===r.childId);
              const statusColors = {pending:'bg-amber-50 border-amber-200', approved:'bg-green-50 border-green-200', declined:'bg-red-50 border-red-200'};
              return (
                <div key={r.id} className={`rounded-xl border p-4 ${statusColors[r.status]}`}>
                  <div className="flex items-center gap-2 mb-2">
                    {ch && <Avatar child={ch} size="sm"/>}
                    <span className="font-medium text-sm">{ch?.name}</span>
                    <span className="text-xs text-gray-500">{formatDate(r.createdAt)}</span>
                    <span className={`ml-auto text-xs px-2 py-0.5 rounded-full ${r.status==='pending'?'bg-amber-100 text-amber-700':r.status==='approved'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
                      {{pending:'Ожидает',approved:'Одобрено',declined:'Отклонено'}[r.status]}
                    </span>
                  </div>
                  <div className="text-sm text-gray-700 mb-1"><span className="font-medium">{r.lessonName}</span> → {r.newTime}</div>
                  <div className="text-xs text-gray-500 mb-3">Причина: {r.reason}</div>
                  {r.status==='pending' && (
                    <div className="flex gap-2">
                      <Btn sm variant="success" onClick={()=>approveRequest(r.id,true)}>✓ Одобрить</Btn>
                      <Btn sm variant="danger" onClick={()=>approveRequest(r.id,false)}>✗ Отклонить</Btn>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </Modal>
      )}
    </div>
  );
}

function AddLessonModal({ onClose, onSave }) {
  const [form, setForm] = useState({ name:'', day:0, row:0, type:'school' });
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  function save() {
    if (!form.name.trim()) return;
    onSave({ name:form.name.trim(), day:parseInt(form.day), row:parseInt(form.row), type:form.type });
  }
  return (
    <Modal title="Добавить урок" onClose={onClose}>
      <div className="space-y-3">
        <div><Label>Название урока</Label><Input value={form.name} onChange={set('name')} placeholder="Математика"/></div>
        <div><Label>День недели</Label>
          <Select value={form.day} onChange={set('day')}>
            {DAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
          </Select>
        </div>
        <div><Label>Время</Label>
          <Select value={form.row} onChange={set('row')}>
            {TIME_SLOTS.map((t,i)=><option key={i} value={i}>{t}</option>)}
          </Select>
        </div>
        <div><Label>Тип занятия</Label>
          <Select value={form.type} onChange={set('type')}>
            {Object.entries(LESSON_TYPES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </Select>
        </div>
        <div className="flex gap-2 pt-2">
          <Btn onClick={save}>Добавить</Btn>
          <Btn variant="secondary" onClick={onClose}>Отмена</Btn>
        </div>
      </div>
    </Modal>
  );
}

const COUNTRY_FLAGS = {
  'Казахстан':'🇰🇿','Россия':'🇷🇺','ОАЭ':'🇦🇪','Дубай':'🇦🇪','Турция':'🇹🇷','Таиланд':'🇹🇭',
  'Греция':'🇬🇷','Италия':'🇮🇹','Испания':'🇪🇸','Франция':'🇫🇷','Германия':'🇩🇪','Великобритания':'🇬🇧',
  'США':'🇺🇸','Канада':'🇨🇦','Япония':'🇯🇵','Корея':'🇰🇷','Китай':'🇨🇳','Индия':'🇮🇳',
  'Мальдивы':'🇲🇻','Египет':'🇪🇬','Кыргызстан':'🇰🇬','Узбекистан':'🇺🇿','Беларусь':'🇧🇾',
  'Астана':'🇰🇿','Алматы':'🇰🇿','Москва':'🇷🇺','Лондон':'🇬🇧','Париж':'🇫🇷','Берлин':'🇩🇪',
};
function getFlag(text) {
  if (!text) return '🌍';
  for (const [k,v] of Object.entries(COUNTRY_FLAGS)) {
    if (text.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return '🌍';
}

function VacationsTab({ children, updateChild, toast, isParent, myChildId }) {
  const [calYear, setCalYear] = useState(2026);
  const [calMonth, setCalMonth] = useState(5); // June
  const [trips, setTrips] = useState(INITIAL_TRIPS);
  const [showAddVac, setShowAddVac] = useState(null);
  const [showAddTrip, setShowAddTrip] = useState(false);
  const [hoveredDay, setHoveredDay] = useState(null);

  function addVacation(childId, data) {
    updateChild(childId, c => ({ ...c, vacations: [...c.vacations, { id: uid(), ...data }] }));
    setShowAddVac(null);
    toast('Каникулы добавлены ✓');
  }

  function removeVacation(childId, vacId) {
    updateChild(childId, c => ({ ...c, vacations: c.vacations.filter(v=>v.id!==vacId) }));
    toast('Период удалён');
  }

  function addTrip(data) {
    setTrips(t => [...t, { id: uid(), ...data }]);
    setShowAddTrip(false);
    toast('Отпуск запланирован ✓');
  }

  // Build calendar day data
  const daysInMonth = getDaysInMonth(calYear, calMonth);
  const firstDay = getFirstDayOfMonth(calYear, calMonth);

  function getDayInfo(date) {
    const iso = date.toISOString().slice(0,10);
    const dw = date.getDay();
    const isWeekend = dw===0||dw===6;
    const trip = trips.find(t => iso>=t.start && iso<=t.end);
    const allVac = children.every(ch => ch.vacations.some(v => iso>=v.start && iso<=v.end));
    const someVac = children.some(ch => ch.vacations.some(v => iso>=v.start && iso<=v.end));
    const vacChildren = children.filter(ch => ch.vacations.some(v => iso>=v.start && iso<=v.end));
    let type = 'school';
    if (isWeekend) type = 'weekend';
    else if (trip) type = 'trip';
    else if (allVac) type = 'all-vac';
    else if (someVac) type = 'some-vac';
    return { type, trip, vacChildren };
  }

  const dayStyles = {
    weekend:  { bg:'bg-gray-100', text:'text-gray-400', dot:'' },
    school:   { bg:'bg-sky-50', text:'text-sky-700', dot:'' },
    'some-vac':{ bg:'bg-amber-100', text:'text-amber-800', dot:'🌤' },
    'all-vac': { bg:'bg-violet-200', text:'text-violet-900', dot:'🎉' },
    trip:     { bg:'bg-emerald-200', text:'text-emerald-900', dot:'✈️' },
  };

  const calCells = [];
  for (let i=0; i<firstDay; i++) calCells.push(null);
  for (let d=1; d<=daysInMonth; d++) {
    calCells.push(new Date(calYear, calMonth, d));
  }

  const prevMonth = () => { if (calMonth===0) { setCalYear(y=>y-1); setCalMonth(11); } else setCalMonth(m=>m-1); };
  const nextMonth = () => { if (calMonth===11) { setCalYear(y=>y+1); setCalMonth(0); } else setCalMonth(m=>m+1); };

  const today = new Date().toISOString().slice(0,10);

  // ── iCal export ──────────────────────────────────────────────────────────
  function toIcalDate(iso) { return iso.replace(/-/g,''); }

  function exportToCalendar() {
    const lines = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//Семейный Планировщик//RU',
      'CALSCALE:GREGORIAN',
      'METHOD:PUBLISH',
      'X-WR-CALNAME:Семейный планировщик',
      'X-WR-TIMEZONE:Asia/Almaty',
    ];

    // Каникулы каждого ребёнка
    children.forEach(ch => {
      ch.vacations.forEach(v => {
        // iCal DTEND для all-day = день после окончания
        const endDate = new Date(v.end + 'T00:00:00');
        endDate.setDate(endDate.getDate() + 1);
        const endIso = endDate.toISOString().slice(0,10).replace(/-/g,'');
        lines.push(
          'BEGIN:VEVENT',
          `DTSTART;VALUE=DATE:${toIcalDate(v.start)}`,
          `DTEND;VALUE=DATE:${endIso}`,
          `SUMMARY:🏖️ Каникулы — ${ch.name} (${v.name})`,
          `DESCRIPTION:Школа: ${ch.school}`,
          `UID:vac-${v.id}@familyplanner`,
          'END:VEVENT',
        );
      });
    });

    // Семейный отпуск
    trips.forEach(t => {
      const endDate = new Date(t.end + 'T00:00:00');
      endDate.setDate(endDate.getDate() + 1);
      const endIso = endDate.toISOString().slice(0,10).replace(/-/g,'');
      lines.push(
        'BEGIN:VEVENT',
        `DTSTART;VALUE=DATE:${toIcalDate(t.start)}`,
        `DTEND;VALUE=DATE:${endIso}`,
        `SUMMARY:✈️ Отпуск: ${t.name}`,
        `UID:trip-${t.id}@familyplanner`,
        'END:VEVENT',
      );
    });

    lines.push('END:VCALENDAR');

    const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'family-calendar.ics'; a.click();
    URL.revokeObjectURL(url);
    toast('Календарь скачан — откройте файл в Google/Apple Calendar ✓');
  }

  // Next trip countdown
  const todayStr = new Date().toISOString().slice(0,10);
  const nextTrip = [...trips].filter(t=>t.end>=todayStr).sort((a,b)=>a.start.localeCompare(b.start))[0];
  const daysToTrip = nextTrip ? Math.max(0,Math.ceil((isoToDate(nextTrip.start)-new Date())/(1000*60*60*24))) : null;

  return (
    <div className="space-y-5">

      {/* ── NEXT TRIP HERO ── */}
      {nextTrip && (
        <div className="relative bg-gradient-to-br from-sky-400 via-blue-500 to-indigo-600 rounded-3xl p-6 text-white shadow-xl overflow-hidden">
          <div className="absolute top-0 right-0 text-8xl opacity-20 -mt-4 -mr-4 select-none">
            {getFlag(nextTrip.country||nextTrip.name)}
          </div>
          <div className="text-sky-200 text-sm font-medium mb-1">✈️ Следующий отпуск</div>
          <div className="text-3xl font-bold mb-1">{nextTrip.name}</div>
          {nextTrip.country && <div className="text-sky-100 text-sm mb-2">{getFlag(nextTrip.country)} {nextTrip.country}</div>}
          {nextTrip.comment && <div className="bg-white/20 rounded-xl px-3 py-2 text-sm text-white mb-3 italic">💬 {nextTrip.comment}</div>}
          <div className="flex items-center gap-4 mt-3">
            <div className="bg-white/20 rounded-xl px-4 py-2 text-center">
              <div className="text-2xl font-bold">{daysToTrip===0?'🎉':daysToTrip}</div>
              <div className="text-xs text-sky-200">{daysToTrip===0?'Сегодня!':'дней до отлёта'}</div>
            </div>
            <div className="text-sm text-sky-100">
              <div>📅 {formatDate(nextTrip.start)} — {formatDate(nextTrip.end)}</div>
              <div className="mt-1">🗓 {Math.ceil((isoToDate(nextTrip.end)-isoToDate(nextTrip.start))/(1000*60*60*24))+1} дней</div>
            </div>
          </div>
        </div>
      )}

      {/* ── ACTIONS ── */}
      <div className="flex flex-wrap gap-2 items-center justify-between">
        <div className="flex gap-2">
          <button onClick={()=>setShowAddVac(children[0]?.id)}
            className="bg-amber-400 hover:bg-amber-500 text-white font-semibold px-4 py-2 rounded-xl text-sm shadow-sm transition-all">
            🏖️ + Каникулы
          </button>
          <button onClick={()=>setShowAddTrip(true)}
            className="bg-blue-500 hover:bg-blue-600 text-white font-semibold px-4 py-2 rounded-xl text-sm shadow-sm transition-all">
            ✈️ + Поездка
          </button>
        </div>
        <button onClick={exportToCalendar}
          className="bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 text-xs font-semibold px-3 py-2 rounded-xl transition-all shadow-sm">
          📲 .ics
        </button>
      </div>

      {/* ── CALENDAR ── */}
      <div className="bg-white rounded-2xl shadow-md overflow-hidden">
        {/* Header */}
        <div className="bg-gradient-to-r from-violet-500 to-purple-600 px-5 py-4 flex items-center justify-between">
          <button onClick={prevMonth} className="w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 text-white flex items-center justify-center text-lg font-bold transition-all">‹</button>
          <div className="text-center">
            <div className="text-white font-bold text-lg">{MONTHS_RU[calMonth]}</div>
            <div className="text-purple-200 text-sm">{calYear}</div>
          </div>
          <button onClick={nextMonth} className="w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 text-white flex items-center justify-center text-lg font-bold transition-all">›</button>
        </div>

        <div className="p-4">
          {/* Day names */}
          <div className="grid grid-cols-7 mb-2">
            {['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map((d,i)=>(
              <div key={d} className={`text-center text-xs font-bold py-1 ${i>=5?'text-rose-400':'text-gray-400'}`}>{d}</div>
            ))}
          </div>

          {/* Days */}
          <div className="grid grid-cols-7 gap-1">
            {calCells.map((date, i) => {
              if (!date) return <div key={i}/>;
              const { type, trip, vacChildren } = getDayInfo(date);
              const st = dayStyles[type];
              const iso = date.toISOString().slice(0,10);
              const isToday = iso === todayStr;
              return (
                <button key={i}
                  onClick={()=>setShowAddVac(children[0]?.id)}
                  onMouseEnter={()=>setHoveredDay({date, type, trip, vacChildren})}
                  onMouseLeave={()=>setHoveredDay(null)}
                  className={`relative aspect-square rounded-xl flex flex-col items-center justify-center text-xs font-semibold transition-all hover:scale-110 hover:shadow-md ${st.bg} ${st.text} ${isToday?'ring-2 ring-offset-1 ring-violet-500':''}`}>
                  <span>{date.getDate()}</span>
                  {st.dot && <span className="text-xs leading-none">{st.dot}</span>}
                </button>
              );
            })}
          </div>

          {/* Hovered day info */}
          {hoveredDay && (hoveredDay.trip || hoveredDay.vacChildren?.length>0) && (
            <div className="mt-3 bg-gray-50 rounded-xl px-4 py-3 text-xs">
              {hoveredDay.trip && (
                <div className="font-semibold text-emerald-700">
                  {getFlag(hoveredDay.trip.country||hoveredDay.trip.name)} ✈️ {hoveredDay.trip.name}
                  {hoveredDay.trip.country && ` · ${hoveredDay.trip.country}`}
                  {hoveredDay.trip.comment && <span className="text-gray-500 ml-1">— {hoveredDay.trip.comment}</span>}
                </div>
              )}
              {hoveredDay.vacChildren?.length>0 && (
                <div className="text-amber-700 mt-1">
                  🏖️ Каникулы: {hoveredDay.vacChildren.map(c=>c.name).join(', ')}
                </div>
              )}
            </div>
          )}

          {/* Legend */}
          <div className="flex flex-wrap gap-2 mt-4">
            {[
              {bg:'bg-sky-50 text-sky-700', emoji:'📚', label:'Учёба'},
              {bg:'bg-amber-100 text-amber-800', emoji:'🌤', label:'Каникулы'},
              {bg:'bg-violet-200 text-violet-900', emoji:'🎉', label:'Все свободны'},
              {bg:'bg-emerald-200 text-emerald-900', emoji:'✈️', label:'Поездка'},
              {bg:'bg-gray-100 text-gray-400', emoji:'', label:'Выходной'},
            ].map(({bg,emoji,label})=>(
              <div key={label} className={`flex items-center gap-1 px-2 py-1 rounded-lg text-xs font-medium ${bg}`}>
                {emoji} {label}
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
        {/* ── TRIPS ── */}
        <div className="bg-white rounded-2xl shadow-md overflow-hidden">
          <div className="bg-gradient-to-r from-sky-400 to-blue-500 px-5 py-3 flex items-center justify-between">

function GradesTab({ children, selectedChild, setSelectedChild, updateChild, toast }) {
  const [view, setView] = useState('overview');
  const [showAddGrade, setShowAddGrade] = useState(false);

  const child = children.find(c=>c.id===selectedChild) || children[0];

  function addGrade(data) {
    const grade = { id: uid(), ...data };
    updateChild(child.id, c => ({ ...c, grades: [grade, ...c.grades] }));
    setShowAddGrade(false);
    toast('Оценка добавлена ✓');
  }

  // Recent grades across all children
  const allGrades = [];
  children.forEach(ch => ch.grades.forEach(g => allGrades.push({...g, childName:ch.name, childColor:ch.color, childId:ch.id})));
  allGrades.sort((a,b) => b.date.localeCompare(a.date));

  return (
    <div>
      <div className="flex gap-2 mb-5">
        <Btn variant={view==='overview'?'primary':'secondary'} onClick={()=>setView('overview')}>Обзор</Btn>
        <Btn variant={view==='individual'?'primary':'secondary'} onClick={()=>setView('individual')}>По ребёнку</Btn>
        <div className="ml-auto"><Btn onClick={()=>setShowAddGrade(true)}>+ Добавить оценку</Btn></div>
      </div>

      {view==='overview' && (
        <div className="space-y-5">
          {/* Child score cards */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {children.map(ch => {
              const avg = getChildAvgScore(ch);
              const subjects = getChildSubjectAverages(ch);
              const best = Object.entries(subjects).sort((a,b)=>b[1]-a[1])[0];
              const worst = Object.entries(subjects).sort((a,b)=>a[1]-b[1])[0];
              const c = COLORS[ch.color];
              return (
                <div key={ch.id} className={`bg-white rounded-xl p-4 border-l-4 ${c.border} shadow-sm cursor-pointer hover:shadow-md transition-shadow`}
                  onClick={()=>{setSelectedChild(ch.id);setView('individual');}}>
                  <div className="flex items-center gap-3 mb-3">
                    <Avatar child={ch} size="md"/>
                    <div>
                      <div className="font-semibold text-gray-800">{ch.name}</div>
                      <div className="text-xs text-gray-500">{ch.class}</div>
                    </div>
                    <div className="ml-auto">
                      <div className={`text-2xl font-bold ${avg>=4.5?'text-green-600':avg>=3.5?'text-blue-600':avg>=2.5?'text-amber-600':'text-red-600'}`}>{avg||'—'}</div>
                    </div>
                  </div>
                  <ProgressBar value={avg} max={5} color={avg>=4?'bg-green-500':avg>=3?'bg-amber-500':'bg-red-500'}/>
                  {best && <div className="text-xs text-gray-500 mt-2">🏆 {best[0]} · ⚠️ {worst[0]}</div>}
                </div>
              );
            })}
          </div>

          {/* Recent grades table */}
          <div className="bg-white rounded-xl shadow-sm overflow-hidden">
            <div className="p-4 border-b border-gray-100"><h3 className="font-semibold text-gray-800">Последние оценки</h3></div>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead className="bg-gray-50">
                  <tr>
                    {['Дата','Ребёнок','Предмет','Оценка','Тип работы'].map(h=>(
                      <th key={h} className="px-4 py-2 text-xs font-medium text-gray-500 text-left">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-50">
                  {allGrades.slice(0,15).map(g => {
                    const c = COLORS[g.childColor];
                    return (
                      <tr key={g.id} className="hover:bg-gray-50">
                        <td className="px-4 py-2 text-xs text-gray-500">{formatDate(g.date)}</td>
                        <td className="px-4 py-2">
                          <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${c.light} ${c.text}`}>{g.childName}</span>
                        </td>
                        <td className="px-4 py-2 text-sm text-gray-700">{g.subject}</td>
                        <td className="px-4 py-2"><ScoreBadge score={g.score}/></td>
                        <td className="px-4 py-2 text-xs text-gray-500">{g.workType}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {view==='individual' && child && (
        <div className="space-y-5">
          {/* Child selector */}
          <div className="flex items-center gap-3 bg-white rounded-xl p-3 shadow-sm">
            {children.map(ch=><Avatar key={ch.id} child={ch} active={ch.id===child.id} onClick={()=>setSelectedChild(ch.id)}/>)}
            <span className="ml-2 font-semibold text-gray-700">{child.name}</span>
          </div>

          {/* Summary */}
          {(() => {
            const avg = getChildAvgScore(child);
            const subjects = getChildSubjectAverages(child);
            const sorted = Object.entries(subjects).sort((a,b)=>b[1]-a[1]);
            const best = sorted[0];
            const worst = sorted[sorted.length-1];
            return (
              <div className="grid grid-cols-3 gap-4">
                <div className="bg-white rounded-xl p-4 shadow-sm text-center">
                  <div className={`text-3xl font-bold mb-1 ${avg>=4.5?'text-green-600':avg>=3.5?'text-blue-600':'text-amber-600'}`}>{avg||'—'}</div>
                  <div className="text-xs text-gray-500">Средний балл</div>
                </div>
                <div className="bg-green-50 rounded-xl p-4 shadow-sm text-center">
                  <div className="text-sm font-semibold text-green-700">🏆 {best?.[0]||'—'}</div>
                  <div className="text-xs text-green-600 mt-1">Лучший предмет</div>
                </div>
                <div className="bg-amber-50 rounded-xl p-4 shadow-sm text-center">
                  <div className="text-sm font-semibold text-amber-700">⚠️ {worst?.[0]||'—'}</div>
                  <div className="text-xs text-amber-600 mt-1">Требует внимания</div>
                </div>
              </div>
            );
          })()}

          {/* Subjects */}
          <div className="bg-white rounded-xl p-5 shadow-sm">
            <h3 className="font-semibold text-gray-800 mb-4">По предметам</h3>
            {Object.entries(getChildSubjectAverages(child)).length===0 && <p className="text-sm text-gray-400">Оценок нет</p>}
            <div className="space-y-3">
              {Object.entries(getChildSubjectAverages(child)).map(([subj,avg])=>(
                <div key={subj}>
                  <div className="flex justify-between text-sm mb-1">
                    <span className="text-gray-700">{subj}</span>
                    <span className={`font-semibold ${avg>=4.5?'text-green-600':avg>=3.5?'text-blue-600':avg>=2.5?'text-amber-600':'text-red-600'}`}>{avg}</span>
                  </div>
                  <ProgressBar value={avg} max={5} color={avg>=4?'bg-green-500':avg>=3?'bg-amber-500':'bg-red-500'}/>
                </div>
              ))}
            </div>
          </div>

          {/* Grades history */}
          <div className="bg-white rounded-xl shadow-sm overflow-hidden">
            <div className="p-4 border-b border-gray-100"><h3 className="font-semibold text-gray-800">История оценок</h3></div>
            {child.grades.length===0 && <p className="p-4 text-sm text-gray-400">Оценок нет</p>}
            <div className="divide-y divide-gray-50">
              {[...child.grades].sort((a,b)=>b.date.localeCompare(a.date)).map(g=>(
                <div key={g.id} className="flex items-center gap-3 px-4 py-2 hover:bg-gray-50">
                  <span className="text-xs text-gray-400 w-24">{formatDate(g.date)}</span>
                  <span className="flex-1 text-sm text-gray-700">{g.subject}</span>
                  <span className="text-xs text-gray-500">{g.workType}</span>
                  <ScoreBadge score={g.score}/>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {showAddGrade && (
        <AddGradeModal children={children} selectedChild={child?.id} onClose={()=>setShowAddGrade(false)} onSave={(childId, data)=>{
          const grade = { id:uid(), ...data };
          updateChild(childId, c=>({...c, grades:[grade,...c.grades]}));
          setShowAddGrade(false);
          toast('Оценка добавлена ✓');
        }}/>
      )}
    </div>
  );
}

// TAB: BUDGET

function BudgetTab({ children, toast, isParent, myChildId }) {
  const [expenses, setExpenses] = useState(INITIAL_EXPENSES);
  const [income, setIncome] = useState(INITIAL_INCOME);
  const [showAddExp, setShowAddExp] = useState(false);
  const [showAddIncome, setShowAddIncome] = useState(false);
  const [activeView, setActiveView] = useState('overview'); // overview | expenses | income

  const fmt = n => n.toLocaleString('ru-RU')+'₸';
  const thisMonth = new Date().toISOString().slice(0,7);

  const visibleExpenses = isParent ? expenses : expenses.filter(e=>e.childId===myChildId);
  const monthExpenses = visibleExpenses.filter(e=>e.date.startsWith(thisMonth));
  const monthIncome = income.filter(i=>i.month===thisMonth);

  const totalIncome = monthIncome.reduce((s,i)=>s+i.amount,0);
  const totalPaid = monthExpenses.filter(e=>e.status==='paid').reduce((s,e)=>s+e.amount,0);
  const totalPending = monthExpenses.filter(e=>e.status==='pending').reduce((s,e)=>s+e.amount,0);
  const totalOverdue = monthExpenses.filter(e=>e.status==='overdue').reduce((s,e)=>s+e.amount,0);
  const totalExpenses = totalPaid+totalPending+totalOverdue;
  const balance = totalIncome - totalPaid;

  const incomeBySource = {};
  monthIncome.forEach(i=>{ incomeBySource[i.source]=(incomeBySource[i.source]||0)+i.amount; });

  const byChild = isParent ? children.map(ch=>({
    child:ch,
    amount:monthExpenses.filter(e=>e.childId===ch.id).reduce((s,e)=>s+e.amount,0),
  })) : [];

  const byCat = {};
  monthExpenses.forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+e.amount;});

  const upcoming = [...visibleExpenses].filter(e=>e.status!=='paid').sort((a,b)=>a.date.localeCompare(b.date));

  function addExpense(data) { setExpenses(p=>[{id:uid(),...data},...p]); setShowAddExp(false); toast('Расход добавлен ✓'); }
  function deleteExpense(id) { setExpenses(p=>p.filter(e=>e.id!==id)); toast('Удалено'); }
  function addIncome(data) { setIncome(p=>[{id:uid(),...data},...p]); setShowAddIncome(false); toast('Доход добавлен ✓'); }
  function deleteIncome(id) { setIncome(p=>p.filter(i=>i.id!==id)); toast('Удалено'); }

  return (
    <div className="space-y-5">
      {/* Sub nav */}
      <div className="flex gap-2">
        {['overview','income','expenses'].map(v=>(
          <Btn key={v} variant={activeView===v?'primary':'secondary'} sm onClick={()=>setActiveView(v)}>
            {v==='overview'?'📊 Обзор':v==='income'?'💚 Доходы':'💸 Расходы'}
          </Btn>
        ))}
      </div>

      {/* ── OVERVIEW ── */}
      {activeView==='overview' && (<>
        {/* Balance hero */}

// TAB: NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════════════════════
function NotificationsTab({ children, notifications, setNotifications, toast, isParent, myChildId }) {
  const [showAdd, setShowAdd] = useState(false);

  // Дети видят только свои уведомления
  const visible = isParent ? notifications : notifications.filter(n=>n.childId===myChildId);
  const unread = visible.filter(n=>!n.read).length;

  function markRead(id) { setNotifications(prev=>prev.map(n=>n.id===id?{...n,read:true}:n)); }
  function markAllRead() {
    const ids = new Set(visible.map(n=>n.id));
    setNotifications(prev=>prev.map(n=>ids.has(n.id)?{...n,read:true}:n));
    toast('Все прочитаны ✓');
  }

  function addNotification(data) {
    setNotifications(prev=>[{ id:uid(), ...data, time:'Только что', read:false }, ...prev]);
    setShowAdd(false);
    toast('Уведомление добавлено ✓');
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <div className="flex items-center gap-2">
          <h2 className="font-semibold text-gray-800">
            {isParent ? 'Уведомления от школ' : 'Мои уведомления от школы'}
          </h2>
          {unread>0&&<span className="bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">{unread}</span>}
        </div>
        <div className="flex gap-2">
          {unread>0&&<Btn variant="secondary" onClick={markAllRead}>Прочитать все</Btn>}
          {isParent&&<Btn onClick={()=>setShowAdd(true)}>+ Уведомление</Btn>}
        </div>
      </div>

      <div className="space-y-3">
        {visible.map(n=>{
          const ch=children.find(c=>c.id===n.childId);
          const c=ch?COLORS[ch.color]:COLORS.blue;
          return (
            <div key={n.id} className={`bg-white rounded-xl p-4 shadow-sm border transition-all ${n.read?'opacity-60 border-gray-100':'border-gray-200'}`}>
              <div className="flex items-start gap-3">
                <div className="text-2xl">{n.icon}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-1">
                    {ch&&<span className={`text-xs font-medium px-2 py-0.5 rounded-full ${c.light} ${c.text}`}>{n.school}</span>}
                    <span className="text-xs text-gray-400">{n.time}</span>
                    {!n.read&&<span className="w-2 h-2 bg-blue-500 rounded-full"/>}
                  </div>
                  <p className="text-sm text-gray-700">{n.text}</p>
                </div>
                {!n.read&&(
                  <button onClick={()=>markRead(n.id)} className="text-xs text-blue-500 hover:text-blue-700 whitespace-nowrap">✓ Прочитано</button>
                )}
              </div>
            </div>
          );
        })}
        {visible.length===0&&<p className="text-gray-400 text-sm">Уведомлений нет</p>}
      </div>

      {showAdd&&<AddNotificationModal children={children} onClose={()=>setShowAdd(false)} onSave={addNotification}/>}
    </div>
  );
}

  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));

  function handlePhotoUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setForm(f=>({...f, photo:ev.target.result, emoji:''}));
    reader.readAsDataURL(file);
  }
  function pickEmoji(em) { setForm(f=>({...f, emoji:em, photo:''})); }
  function clearAvatar() { setForm(f=>({...f, photo:'', emoji:''})); }

  const sType = schoolTypeLabel(form.school, form.class);

  return (
    <Modal title={`✏️ ${child.name}`} onClose={onClose} wide>

              <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handlePhotoUpload}/>

                className="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold py-2 px-3 rounded-lg transition-colors flex items-center justify-center gap-1.5">
                📷 Загрузить фото

                  Убрать фото
                </button>
              )}
            </div>
          </div>

          {/* Emoji grid */}
          <div className="mt-3">
            <div className="text-xs text-gray-500 mb-2">Или выбрать аватар:</div>

                <button key={em} type="button" onClick={()=>pickEmoji(em)}

          <div><Label>Фамилия</Label><Input value={form.surname} onChange={set('surname')}/></div>

        {/* School — grouped */}
        <div>
          <Label>Учебное заведение</Label>
          <div className="space-y-2 mb-2">
            {SCHOOL_GROUPS.map(g=>(
              <div key={g.label}>
                <div className="text-xs text-gray-400 font-medium mb-1">{g.label}</div>
                <div className="flex flex-wrap gap-1.5">

        <div>
          <Label>{sType==='Университет'?'Вуз / факультет':sType==='Садик'?'Группа':'Класс'}</Label>

              <div key={g.label}>
                <div className="text-xs text-gray-400 font-medium mb-1">{g.label}</div>
                <div className="flex flex-wrap gap-1.5">
                  {g.items.map(p=>(
                    <button key={p} type="button" onClick={()=>setForm(f=>({...f,class:p}))}
                      className={`px-2.5 py-1 rounded-lg text-xs font-medium border transition-all ${form.class===p?'bg-blue-600 text-white border-blue-600':'bg-gray-50 text-gray-600 border-gray-200 hover:border-blue-400 hover:text-blue-600'}`}>
                      {p}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <Input value={form.class} onChange={set('class')} placeholder="Или введите вручную (1А, 2 курс, F4...)"/>

        <div className="grid grid-cols-2 gap-3">
          <div><Label>Возраст</Label><Input type="number" value={form.age} onChange={set('age')} placeholder="8"/></div>

            <Label>Цвет</Label>

              {Object.entries(COLORS).map(([key,c])=>(
                <button key={key} type="button" onClick={()=>setForm(f=>({...f,color:key}))}
                  className={`w-8 h-8 rounded-full ${c.bg} ring-2 ring-offset-2 transition-all ${form.color===key?'ring-gray-800 scale-110':'ring-transparent hover:scale-105'}`}/>

    </Modal>
  );
}

// TAB: FLIGHTS (перелёты детей)
// ═══════════════════════════════════════════════════════════════════════════════
const INITIAL_FLIGHTS = {
  c1:[{id:'f1',from:'Алматы',to:'Астана',date:'2026-06-15',airline:'Air Astana',flightNo:'KC123',status:'upcoming'}],
  c2:[{id:'f2',from:'Алматы',to:'Дубай',date:'2026-07-01',airline:'FlyDubai',flightNo:'FZ567',status:'upcoming'}],
  c3:[], c4:[], c5:[],
};

function FlightsTab({ children, updateChild, toast, isParent, myChildId }) {
  const [flights, setFlights] = useState(INITIAL_FLIGHTS);
  const [showAdd, setShowAdd] = useState(null); // childId
  const [selectedChildId, setSelectedChildId] = useState(isParent ? children[0]?.id : myChildId);

  const visibleChildren = isParent ? children : children.filter(c=>c.id===myChildId);

  function addFlight(childId, data) {
    setFlights(prev=>({ ...prev, [childId]:[...(prev[childId]||[]), {id:uid(),...data}] }));
    setShowAdd(null);
    toast('Перелёт добавлен ✓');
  }
  function removeFlight(childId, id) {
    setFlights(prev=>({ ...prev, [childId]:(prev[childId]||[]).filter(f=>f.id!==id) }));
    toast('Перелёт удалён');
  }
  function markFlightDone(childId, id) {
    setFlights(prev=>({ ...prev, [childId]:(prev[childId]||[]).map(f=>f.id===id?{...f,status:'done'}:f) }));
  }

  const currentChild = children.find(c=>c.id===selectedChildId);

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold text-gray-800">✈️ Перелёты</h2>
      </div>

      {/* Child selector */}
      {isParent && (
        <div className="flex gap-2 flex-wrap">
          {children.map(ch=>(
            <button key={ch.id} onClick={()=>setSelectedChildId(ch.id)}
              className={`flex items-center gap-2 px-3 py-2 rounded-xl border text-sm font-medium transition-all ${selectedChildId===ch.id?`${COLORS[ch.color].bg} text-white border-transparent`:'bg-white border-gray-200 text-gray-600 hover:border-gray-300'}`}>
              <span>{ch.name}</span>
            </button>
          ))}
        </div>
      )}

      {currentChild && (
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="flex items-center justify-between p-4 border-b border-gray-100">
            <div className="flex items-center gap-3">
              <Avatar child={currentChild} size="sm"/>
              <span className="font-semibold text-gray-800">{currentChild.name} — перелёты</span>
            </div>
            <Btn sm onClick={()=>setShowAdd(currentChild.id)}>+ Добавить</Btn>
          </div>

          {(flights[currentChild.id]||[]).length===0 && (
            <p className="p-6 text-center text-gray-400 text-sm">Нет запланированных перелётов</p>
          )}

          <div className="divide-y divide-gray-50">
            {[...(flights[currentChild.id]||[])].sort((a,b)=>a.date.localeCompare(b.date)).map(f=>(
              <div key={f.id} className={`flex items-center gap-4 px-4 py-3 hover:bg-gray-50 ${f.status==='done'?'opacity-50':''}`}>
                <div className="text-2xl">🛫</div>
                <div className="flex-1">
                  <div className="font-semibold text-gray-800">{f.from} → {f.to}</div>
                  <div className="text-xs text-gray-500">{f.airline} · {f.flightNo}</div>
                </div>
                <div className="text-sm text-gray-600 font-medium">{formatDate(f.date)}</div>
                <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${f.status==='upcoming'?'bg-blue-100 text-blue-700':'bg-gray-100 text-gray-500'}`}>
                  {f.status==='upcoming'?'Предстоящий':'Выполнен'}
                </span>
                {f.status==='upcoming' && <Btn sm variant="success" onClick={()=>markFlightDone(currentChild.id,f.id)}>✓</Btn>}
                <Btn sm variant="danger" onClick={()=>removeFlight(currentChild.id,f.id)}>×</Btn>
              </div>
            ))}
          </div>
        </div>
      )}

      {showAdd && (
        <Modal title="Добавить перелёт" onClose={()=>setShowAdd(null)}>
          <AddFlightForm onClose={()=>setShowAdd(null)} onSave={data=>addFlight(showAdd,data)}/>
        </Modal>
      )}
    </div>
  );
}

// TAB: EXAMS (экзамены детей)
// ═══════════════════════════════════════════════════════════════════════════════
const EXAM_TYPES = ['ЕНТ','Олимпиада','Контрольная','Зачёт','Собеседование','Другое'];

function ExamsTab({ children, updateChild, toast, isParent, myChildId }) {
  const [exams, setExams] = useState({
    c1:[
      {id:'ex1',subject:'Математика',type:'ЕНТ',date:'2026-06-10',time:'09:00',location:'Школа №1',note:'Взять паспорт',status:'upcoming'},
      {id:'ex2',subject:'Физика',type:'Олимпиада',date:'2026-06-20',time:'10:00',location:'ГорОО',note:'',status:'upcoming'},
    ],
    c2:[{id:'ex3',subject:'Алгебра',type:'Контрольная',date:'2026-06-05',time:'08:30',location:'Школа №3',note:'',status:'upcoming'}],
    c3:[], c4:[], c5:[],
  });
  const [showAdd, setShowAdd] = useState(null);
  const [selectedChildId, setSelectedChildId] = useState(isParent ? children[0]?.id : myChildId);

  function addExam(childId, data) {
    setExams(prev=>({...prev,[childId]:[...(prev[childId]||[]),{id:uid(),...data}]}));
    setShowAdd(null);
    toast('Экзамен добавлен ✓');
  }
  function removeExam(childId, id) {
    setExams(prev=>({...prev,[childId]:(prev[childId]||[]).filter(e=>e.id!==id)}));
    toast('Экзамен удалён');
  }
  function markExamDone(childId, id) {
    setExams(prev=>({...prev,[childId]:(prev[childId]||[]).map(e=>e.id===id?{...e,status:'done'}:e)}));
  }

  // upcoming across all visible children (for parent overview)
  const allUpcoming = [];
  (isParent ? children : children.filter(c=>c.id===myChildId)).forEach(ch=>{
    (exams[ch.id]||[]).filter(e=>e.status==='upcoming').forEach(e=>allUpcoming.push({...e,child:ch}));
  });
  allUpcoming.sort((a,b)=>a.date.localeCompare(b.date));

  const currentChild = children.find(c=>c.id===selectedChildId);

  const daysUntil = (dateStr) => {
    const diff = Math.ceil((isoToDate(dateStr)-new Date())/(1000*60*60*24));
    if (diff===0) return 'Сегодня!';
    if (diff<0) return 'Прошёл';
    return `${diff} дн.`;
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold text-gray-800">📝 Экзамены</h2>
      </div>

      {/* Nearest exams (all children) */}
      {allUpcoming.length>0 && (
        <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
          <div className="font-semibold text-amber-800 mb-3">⏰ Ближайшие экзамены</div>
          <div className="space-y-2">
            {allUpcoming.slice(0,5).map(e=>(
              <div key={e.id} className="flex items-center gap-3 bg-white rounded-lg px-3 py-2 shadow-sm">
                {isParent && <Avatar child={e.child} size="sm"/>}
                <div className="flex-1">
                  <span className="font-medium text-gray-800 text-sm">{e.subject}</span>
                  <span className="ml-2 text-xs text-gray-500">{e.type}</span>
                </div>
                <span className="text-xs text-gray-500">{formatDate(e.date)} {e.time}</span>
                <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${daysUntil(e.date)==='Сегодня!'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'}`}>
                  {daysUntil(e.date)}
                </span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Child selector */}
      {isParent && (
        <div className="flex gap-2 flex-wrap">
          {children.map(ch=>(
            <button key={ch.id} onClick={()=>setSelectedChildId(ch.id)}
              className={`flex items-center gap-2 px-3 py-2 rounded-xl border text-sm font-medium transition-all ${selectedChildId===ch.id?`${COLORS[ch.color].bg} text-white border-transparent`:'bg-white border-gray-200 text-gray-600 hover:border-gray-300'}`}>
              {ch.name}
              {(exams[ch.id]||[]).filter(e=>e.status==='upcoming').length>0 &&
                <span className="bg-white/30 text-xs px-1.5 rounded-full">{(exams[ch.id]||[]).filter(e=>e.status==='upcoming').length}</span>}
            </button>
          ))}
        </div>
      )}

      {/* Exam list for selected child */}
      {currentChild && (
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="flex items-center justify-between p-4 border-b border-gray-100">
            <div className="flex items-center gap-3">
              <Avatar child={currentChild} size="sm"/>
              <span className="font-semibold text-gray-800">{currentChild.name}</span>
            </div>
            <Btn sm onClick={()=>setShowAdd(currentChild.id)}>+ Экзамен</Btn>
          </div>

          {(exams[currentChild.id]||[]).length===0 && (
            <p className="p-6 text-center text-gray-400 text-sm">Экзаменов нет</p>
          )}

          <div className="divide-y divide-gray-50">
            {[...(exams[currentChild.id]||[])].sort((a,b)=>a.date.localeCompare(b.date)).map(ex=>(
              <div key={ex.id} className={`px-4 py-3 hover:bg-gray-50 ${ex.status==='done'?'opacity-50':''}`}>
                <div className="flex items-start gap-3">
                  <div className="text-2xl">📋</div>
                  <div className="flex-1">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="font-semibold text-gray-800">{ex.subject}</span>
                      <span className="text-xs bg-violet-100 text-violet-700 px-2 py-0.5 rounded-full">{ex.type}</span>
                      <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${ex.status==='done'?'bg-gray-100 text-gray-500':daysUntil(ex.date)==='Сегодня!'?'bg-red-100 text-red-700':'bg-blue-100 text-blue-700'}`}>
                        {ex.status==='done'?'Сдан':daysUntil(ex.date)}
                      </span>
                    </div>
                    <div className="text-xs text-gray-500 mt-1">
                      📅 {formatDate(ex.date)} в {ex.time} · 📍 {ex.location}
                    </div>
                    {ex.note && <div className="text-xs text-amber-700 mt-1">💡 {ex.note}</div>}
                  </div>
                  <div className="flex gap-1">
                    {ex.status==='upcoming' && <Btn sm variant="success" onClick={()=>markExamDone(currentChild.id,ex.id)}>✓</Btn>}
                    <Btn sm variant="danger" onClick={()=>removeExam(currentChild.id,ex.id)}>×</Btn>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {showAdd && (
        <Modal title="Добавить экзамен" onClose={()=>setShowAdd(null)}>
          <AddExamForm onClose={()=>setShowAdd(null)} onSave={data=>addExam(showAdd,data)}/>
        </Modal>
      )}
    </div>
  );
}

function AddExamForm({ onClose, onSave }) {
  const [form, setForm] = useState({subject:'',type:'Контрольная',date:'',time:'09:00',location:'',note:'',status:'upcoming'});
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  return (

// ═══════════════════════════════════════════════════════════════════════════════
// TAB: HOME DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function HomeTab({ children, user, isParent, myChildId, notifications, setActiveTab, toast }) {
  const now = new Date();
  const todayIdx = now.getDay() === 0 ? 6 : now.getDay() - 1;
  const todayStr = now.toISOString().slice(0,10);
  const hours = now.getHours();
  const greeting = hours < 12 ? 'Доброе утро' : hours < 17 ? 'Добрый день' : 'Добрый вечер';
  const DAYS_FULL = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
  const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const dateStr = `${now.getDate()} ${MONTHS[now.getMonth()]}, ${DAYS_FULL[todayIdx]}`;

  const visibleChildren = isParent ? children : children.filter(c=>c.id===myChildId);

  // Today's lessons across visible children
  const todayLessons = [];
  visibleChildren.forEach(ch => {
    ch.lessons.filter(l=>l.day===todayIdx).sort((a,b)=>a.row-b.row).forEach(l => {
      todayLessons.push({...l, child:ch});
    });
  });

  // Unread notifications for visible children
  const myNotifs = isParent
    ? notifications.filter(n=>!n.read)
    : notifications.filter(n=>!n.read && n.childId===myChildId);

  // Nearest vacation
  const allVacDates = [];
  visibleChildren.forEach(ch => ch.vacations.forEach(v => {
    if (v.start >= todayStr) allVacDates.push({...v, child:ch});
  }));
  allVacDates.sort((a,b)=>a.start.localeCompare(b.start));
  const nextVac = allVacDates[0];
  const daysToVac = nextVac ? Math.max(0,Math.ceil((new Date(nextVac.start)-now)/(1000*60*60*24))) : null;

  return (
    <div className="space-y-5">
      {/* Header greeting */}
      <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-5 text-white shadow-lg">
        <p className="text-blue-200 text-sm">{greeting} 👋</p>
        <h2 className="text-2xl font-bold mt-1">{user.name}</h2>
        <p className="text-blue-200 text-sm mt-1">{dateStr}</p>

        {nextVac && (
          <div className="mt-3 bg-white/15 rounded-xl px-4 py-2 flex items-center justify-between">
            <span className="text-sm">🏖️ До каникул {nextVac.child?.name && isParent ? `(${nextVac.child.name})` : ''}</span>
            <span className="font-bold text-lg">{daysToVac === 0 ? 'Сегодня!' : `${daysToVac} дн.`}</span>
          </div>
        )}
      </div>

      {/* Unread notifications alert */}
      {myNotifs.length > 0 && (
        <button onClick={()=>setActiveTab('notifications')} className="w-full bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-center gap-3 hover:bg-amber-100 transition-colors text-left">
          <span className="text-2xl">🔔</span>
          <div className="flex-1">
            <div className="font-semibold text-amber-800 text-sm">Новые уведомления от школы</div>
            <div className="text-amber-600 text-xs mt-0.5">{myNotifs[0].text.slice(0,60)}...</div>
          </div>
          <span className="bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">{myNotifs.length}</span>
        </button>
      )}

      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
        {/* Today's schedule */}
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="flex items-center justify-between px-4 py-3 border-b border-gray-100">
            <h3 className="font-semibold text-gray-800">📅 Сегодня</h3>
            <button onClick={()=>setActiveTab('schedule')} className="text-xs text-blue-500 hover:text-blue-700">Все →</button>
          </div>
          {todayLessons.length === 0 ? (
            <div className="p-6 text-center text-gray-400 text-sm">
              {todayIdx >= 5 ? '🎉 Выходной!' : 'Уроков нет'}
            </div>
          ) : (
            <div className="divide-y divide-gray-50 max-h-64 overflow-y-auto">
              {todayLessons.map((l,i)=>{
                const c = COLORS[l.child.color];

                    <div className="font-medium text-gray-800 text-sm">{ch.name}</div>

      {/* Quick actions */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {[
          {icon:'✏️',label:'Д/З',tab:'homework',color:'bg-violet-50 border-violet-200 text-violet-700'},
          {icon:'📊',label:'Оценки',tab:'grades',color:'bg-blue-50 border-blue-200 text-blue-700'},
          {icon:'💰',label:'Бюджет',tab:'budget',color:'bg-green-50 border-green-200 text-green-700'},
          {icon:'📝',label:'Экзамены',tab:'exams',color:'bg-amber-50 border-amber-200 text-amber-700'},
        ].map(a=>(
          <button key={a.tab} onClick={()=>setActiveTab(a.tab)}
            className={`${a.color} border rounded-xl py-4 flex flex-col items-center gap-1.5 hover:scale-105 transition-transform`}>
            <span className="text-2xl">{a.icon}</span>
            <span className="text-xs font-semibold">{a.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// TAB: HOMEWORK
// ═══════════════════════════════════════════════════════════════════════════════
const HW_INITIAL = { c1:[], c2:[], c3:[], c4:[], c5:[] };

function HomeworkTab({ children, updateChild, toast, isParent, myChildId }) {
  const [hw, setHw] = useState(HW_INITIAL);
  const [showAdd, setShowAdd] = useState(null);
  const [selChild, setSelChild] = useState(isParent ? children[0]?.id : myChildId);

  const visibleChildren = isParent ? children : children.filter(c=>c.id===myChildId);
  const child = children.find(c=>c.id===selChild);

  function addHw(childId, data) {
    setHw(prev=>({...prev,[childId]:[{id:uid(),...data,done:false},...(prev[childId]||[])]}));
    setShowAdd(null); toast('Задание добавлено ✓');
  }
  function toggleHw(childId, id) {
    setHw(prev=>({...prev,[childId]:(prev[childId]||[]).map(h=>h.id===id?{...h,done:!h.done}:h)}));
  }
  function deleteHw(childId, id) {
    setHw(prev=>({...prev,[childId]:(prev[childId]||[]).filter(h=>h.id!==id)}));
    toast('Удалено');
  }

  const today = new Date().toISOString().slice(0,10);
  const childHw = hw[selChild] || [];
  const pending = childHw.filter(h=>!h.done).sort((a,b)=>a.due.localeCompare(b.due));
  const done = childHw.filter(h=>h.done);

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold text-gray-800">✏️ Домашние задания</h2>
      </div>

      {/* Child selector */}
      {isParent && (
        <div className="flex gap-2 flex-wrap">
          {children.map(ch=>(
            <button key={ch.id} onClick={()=>setSelChild(ch.id)}
              className={`flex items-center gap-2 px-3 py-2 rounded-xl border text-sm font-medium transition-all ${selChild===ch.id?`${COLORS[ch.color].bg} text-white border-transparent`:'bg-white border-gray-200 text-gray-600 hover:border-gray-300'}`}>
              {ch.name}
              {(hw[ch.id]||[]).filter(h=>!h.done).length>0 &&
                <span className={`text-xs px-1.5 rounded-full ${selChild===ch.id?'bg-white/30 text-white':'bg-red-100 text-red-600'}`}>
                  {(hw[ch.id]||[]).filter(h=>!h.done).length}
                </span>}
            </button>
          ))}
        </div>
      )}

      {/* Add button */}
      <div className="flex justify-end">
        <Btn onClick={()=>setShowAdd(selChild)}>+ Задание</Btn>
      </div>

      {/* Pending */}
      <div className="bg-white rounded-xl shadow-sm overflow-hidden">
        <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
          <h3 className="font-semibold text-gray-800">Не сделано</h3>
          {pending.length>0 && <span className="bg-red-100 text-red-700 text-xs px-2 py-0.5 rounded-full font-medium">{pending.length}</span>}
        </div>
        {pending.length===0 && <p className="p-6 text-center text-gray-400 text-sm">🎉 Всё сделано!</p>}
        <div className="divide-y divide-gray-50">
          {pending.map(h=>{
            const overdue = h.due < today;
            return (
              <div key={h.id} className="flex items-start gap-3 px-4 py-3 hover:bg-gray-50">
                <button onClick={()=>toggleHw(selChild,h.id)}
                  className="w-5 h-5 mt-0.5 rounded-full border-2 border-gray-300 hover:border-green-500 flex-shrink-0 transition-colors"/>
                <div className="flex-1 min-w-0">
                  <div className="font-medium text-gray-800 text-sm">{h.subject}</div>
                  <div className="text-gray-600 text-xs mt-0.5">{h.task}</div>
                  <div className={`text-xs mt-1 font-medium ${overdue?'text-red-600':'text-gray-400'}`}>
                    {overdue?'⚠️ Просрочено — ':'📅 '}{formatDate(h.due)}
                  </div>
                </div>
                <button onClick={()=>deleteHw(selChild,h.id)} className="text-gray-300 hover:text-red-500 transition-colors text-lg">×</button>
              </div>
            );
          })}
        </div>
      </div>

      {/* Done */}
      {done.length>0 && (
        <div className="bg-white rounded-xl shadow-sm overflow-hidden opacity-60">
          <div className="px-4 py-3 border-b border-gray-100">
            <h3 className="font-semibold text-gray-700">✅ Выполнено ({done.length})</h3>
          </div>
          <div className="divide-y divide-gray-50">
            {done.map(h=>(
              <div key={h.id} className="flex items-start gap-3 px-4 py-2.5">
                <button onClick={()=>toggleHw(selChild,h.id)}
                  className="w-5 h-5 mt-0.5 rounded-full bg-green-500 flex-shrink-0 flex items-center justify-center">
                  <span className="text-white text-xs">✓</span>
                </button>
                <div className="flex-1">
                  <div className="text-sm text-gray-500 line-through">{h.subject} — {h.task}</div>
                </div>
                <button onClick={()=>deleteHw(selChild,h.id)} className="text-gray-200 hover:text-red-400 text-lg">×</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {showAdd && child && (
        <Modal title={`Задание — ${child.name}`} onClose={()=>setShowAdd(null)}>
          <AddHwForm subjects={[...new Set(child.lessons.map(l=>l.name))]} onClose={()=>setShowAdd(null)} onSave={d=>addHw(showAdd,d)}/>
        </Modal>
      )}
    </div>
  );
}

  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  const [form, setForm] = useState({subject:'', task:'', due:tomorrow.toISOString().slice(0,10)});

    <div className="space-y-3">

        <Label>Предмет</Label>
        {subjects.length>0 && (
          <div className="flex flex-wrap gap-1.5 mb-2">

                className={`px-2.5 py-1 rounded-lg text-xs font-medium border transition-all ${form.subject===s?'bg-blue-600 text-white border-blue-600':'bg-gray-50 text-gray-600 border-gray-200 hover:border-blue-400'}`}>
                {s}

        <Input value={form.subject} onChange={set('subject')} placeholder="Математика"/>

      <div className="flex gap-2 pt-1">
